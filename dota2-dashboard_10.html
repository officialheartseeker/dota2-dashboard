<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dota 2 · Match Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>

    :root {
      --bg: #0a0c10;
      --surface: #111418;
      --card: #161b22;
      --border: #21262d;
      --accent: #c8392b;
      --accent2: #e8872a;
      --live: #22c55e;
      --upcoming: rgb(180, 192, 16);
      --completed: rgba(209, 22, 22, 0.938);
      --text: #e6edf3;
      --muted: #7d8590;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    .team-link {
    color: inherit;
    text-decoration: none;
    }
    .team-link:hover {
      text-decoration: underline;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'IBM Plex Mono', monospace;
      min-height: 100vh;
      padding: 1.5rem;
      /* Grid layout — lägg till fler widgets bredvid varandra */
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(450px, 1fr));
      grid-template-rows: auto;
      gap: 1.25rem;
      align-items: start;
    }
    
    /* ── STREAM PANEL ── */
      .stream-panel {
        background: var(--surface);
        border: 1px solid #9147ff44;
        border-radius: 6px;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        grid-column: 1 / -1;          /* span full width */
      }
      .stream-panel.hidden {
        display: none;
      }
      .stream-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0.5rem 1rem;
        background: var(--card);
        border-bottom: 1px solid var(--border);
      }
      .stream-info {
        display: flex;
        align-items: center;
        gap: 0.6rem;
        min-width: 0;
      }
      .stream-live-dot {
        width: 8px; height: 8px;
        border-radius: 50%;
        background: #9147ff;
        animation: blink 1.2s step-end infinite;
        flex-shrink: 0;
      }
      .stream-label {
        font-family: 'Rajdhani', sans-serif;
        font-size: 0.85rem;
        font-weight: 700;
        letter-spacing: 0.06em;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .stream-actions {
        display: flex;
        gap: 0.4rem;
        flex-shrink: 0;
      }
      .stream-actions button {
        background: none;
        border: 1px solid var(--border);
        color: var(--muted);
        cursor: pointer;
        padding: 0.25rem 0.6rem;
        border-radius: 3px;
        font-size: 0.65rem;
        font-family: 'IBM Plex Mono', monospace;
        transition: all 0.15s;
      }
      .stream-actions button:hover {
        border-color: #9147ff;
        color: var(--text);
      }
      .stream-panel iframe {
        width: 100%;
        height: 600px;              /* ← ändra här för att justera höjden */
        border: none;
        display: block;
      }
      .stream-panel.fullscreen {
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        z-index: 9999;
        border-radius: 0;
        grid-column: auto;
      }
      .stream-panel.fullscreen iframe {
        height: calc(100vh - 42px);  /* fill screen minus header */
      }
    .stream-btn {
      display: block;
      padding: 4px 7px;
      font-size: 0.6rem;
      background: #9147ff;
      color: white;
      text-decoration: none;
      border-radius: 3px;
      margin-top: 6px;
      margin: 5 auto;
      transition: background 0.15s;
    }

  .stream-btn:hover {
    background: #772ce8;
  }

    /* ── WIDGET-CONTAINER ── */
    .widget {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
      position: relative;
      min-width: 0;
    }

    .widget-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.9rem 1.1rem;
      border-bottom: 1px solid var(--border);
      position: relative;
      gap: 0.75rem;
    }
    .widget-header::after {
      content: '';
      position: absolute;
      bottom: -1px; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, var(--accent), transparent 50%);
    }

    .widget-title {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      min-width: 0;
    }
    .logo-icon {
      width: 28px; height: 28px;
      background: var(--accent);
      clip-path: polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 0.65rem;
      color: white; flex-shrink: 0;
      animation: pulse-icon 3s ease-in-out infinite;
    }
    @keyframes pulse-icon {
      0%,100% { filter: brightness(1); }
      50% { filter: brightness(1.3) drop-shadow(0 0 5px rgba(200,57,43,.6)); }
    }
    .widget-label {
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.95rem; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
      white-space: nowrap;
    }
    .widget-label span { color: var(--accent); }

    .widget-actions {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-shrink: 0;
    }
    .updated-text {
      font-size: 0.6rem; color: var(--muted);
      white-space: nowrap;
    }
    .updated-text strong { color: var(--text); }

    .icon-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.65rem;
      padding: 0.2rem 0.55rem;
      border-radius: 2px;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .icon-btn:hover { border-color: var(--accent); color: var(--text); }
    .icon-btn.spinning .spin-icon { display: inline-block; animation: spin 0.6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── MATCH LIST ── */
    .widget-body { padding: 0.75rem; }

    .match-row {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.65rem 0.75rem;
      border-radius: 4px;
      border: 1px solid transparent;
      margin-bottom: 0.4rem;
      position: relative;
      transition: background 0.15s, border-color 0.15s;
      animation: fadeIn 0.3s ease both;
    }
    .match-row:last-child { margin-bottom: 0; }
    .match-row:hover { background: rgba(255,255,255,0.025); }
    .match-row.is-live {
      border-color: rgba(34,197,94,0.2);
      background: rgba(34,197,94,0.03);
    }
    .match-row::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 2px;
      border-radius: 2px 0 0 2px;
    }
       .match-row.is-completed {
      border-color: rgba(224, 20, 20, 0.2);
      background: rgba(34,197,94,0.03);
    }
       .match-row.is-upcoming {
      border-color: rgb(93, 97, 36);
      background: rgba(34,197,94,0.03);
    }
    .match-row.is-live::before { background: var(--live); }
    .match-row.is-upcoming::before { background: var(--upcoming); }
    .match-row.is-completed::before { background: var(--completed); }


    @keyframes fadeIn { from { opacity:0; transform:translateX(-6px); } to { opacity:1; transform:translateX(0); } }

    /* Teams */
    .match-teams {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 0.5rem;
    }
    .team-name {
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.95rem; font-weight: 700;
      color: var(--text);
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .team-name.tbd { color: var(--muted); font-style: italic; font-weight: 400; }
      .team-name.left {
        text-align: right;
      }

      .team-name.right {
        text-align: left;
      }

    .score-center {
      display: flex;
      align-items: center;
      gap: 0.25rem;
      flex-shrink: 0;
    }
    .score {
      font-family: 'Rajdhani', sans-serif;
      font-size: 1.1rem; font-weight: 700;
      color: var(--muted);
      min-width: 1ch; text-align: center;
    }
    .score.winner { color: var(--live); }
    .score-sep { font-size: 0.75rem; color: var(--border); }
    .vs { font-size: 0.6rem; color: var(--muted); letter-spacing: 0.08em; }

    /* Meta */
    .match-meta {
      width: 200px;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 0.2rem;
    }
    .live-badge {
      font-size: 0.58rem; font-weight: 600;
      letter-spacing: 0.1em;
      color: var(--live);
      animation: blink 1.2s step-end infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .time-tag { font-size: 0.6rem; color: var(--muted); }
    .time-tag.soon { color: var(--accent2); }
    .tourn-tag {
      font-size: 0.55rem; color: var(--muted);
      max-width: none;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      text-align: right;
    }
    .stream-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #9147ff;
      cursor: pointer;
      flex-shrink: 0;
      title: "Stream available";
    }

    /* Dismiss button */
    .dismiss-btn {
      background: transparent;
      border: none;
      color: #2d333b;
      font-size: 0.75rem;
      cursor: pointer;
      padding: 0.1rem 0.25rem;
      border-radius: 2px;
      transition: color 0.15s;
      flex-shrink: 0;
      line-height: 1;
    }
    .match-row:hover .dismiss-btn { color: var(--muted); }
    .dismiss-btn:hover { color: var(--accent) !important; }

    /* Section dividers */
    .section-divider {
      display: flex; align-items: center; gap: 0.5rem;
      padding: 0.3rem 0.75rem 0.5rem;
      font-size: 0.6rem; font-weight: 600;
      letter-spacing: 0.15em; text-transform: uppercase;
      color: var(--muted);
    }
    .section-divider .dot {
      width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
    }
    .section-divider.live-section .dot { background: var(--live); box-shadow: 0 0 6px var(--live); animation: blink 1.2s step-end infinite; }
    .section-divider.completed-section .dot { background: var(--completed); }
    .section-divider.upcoming-section .dot { background: var(--upcoming); }
    .section-divider .line { flex:1; height:1px; background: var(--border); }
    .section-divider .cnt {
      font-size: 0.55rem; padding: 0.1rem 0.4rem;
      border-radius: 2px;
    }
    .live-section .cnt { background: rgba(34,197,94,0.12); color: var(--live); }
    .upcoming-section .cnt { background: rgba(59,130,246,0.12); color: var(--upcoming); }

    /* States */
    .loading-state {
      display: flex; align-items: center; justify-content: center;
      gap: 0.75rem; padding: 2rem;
      color: var(--muted); font-size: 0.7rem; letter-spacing: 0.08em;
    }
    .loader {
      width: 18px; height: 18px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      flex-shrink: 0;
    }
    .empty-state {
      text-align: center; padding: 2rem 1rem;
      color: var(--muted); font-size: 0.7rem;
    }
    .error-state {
      padding: 1rem 0.75rem;
      font-size: 0.7rem; color: var(--accent);
      border-radius: 4px;
      background: rgba(200,57,43,0.05);
      border: 1px solid rgba(200,57,43,0.2);
      line-height: 1.6;
    }
  </style>
</head>
<body>

  <!-- WIDGET 1: Dota 2 Matches -->
  <div class="widget" id="dota-widget">
    <div class="widget-header">
      <div class="widget-title">
        <div class="logo-icon">D2</div>
        <div class="widget-label">Dota <span>2</span> · Matches</div>
      </div>
      <div class="widget-actions">
        <div class="updated-text" id="updated-text">—</div>
        <button class="icon-btn" onclick="loadMatches()" id="refresh-btn">
          <span class="spin-icon">↻</span> Refresh
        </button>
      </div>
    </div>
    <div class="widget-body" id="match-body">
      <div class="loading-state"><div class="loader"></div>Fetching matches...</div>
    </div>
  </div>
    <!-- STREAM PANEL -->
  <div id="stream-panel" class="stream-panel hidden">
    <div class="stream-header">
      <div class="stream-info">
        <div class="stream-live-dot"></div>
        <span class="stream-label" id="stream-label">Watching...</span>
      </div>
      <div class="stream-actions">
        <button onclick="toggleFullscreen()">⛶ Fullscreen</button>
        <button onclick="closeStream()">✕ Close</button>
      </div>
    </div>
    <iframe id="stream-frame" src="" allowfullscreen></iframe>
  </div>

<script>
  const API = 'https://liquipedia.net/dota2/api.php?action=parse&page=Main_Page&prop=text&format=json&origin=*';

  let dismissed = new Set(JSON.parse(sessionStorage.getItem('d2_dismissed') || '[]'));
  function saveDismissed() {
    sessionStorage.setItem('d2_dismissed', JSON.stringify([...dismissed]));
  }

  function matchId(m) {
    return m.t1 + '|' + m.t2 + '|' + (m.dateISO || '');
  }

  function formatTime(iso) {
    if (!iso) return null;
    const d = new Date(iso);
    const now = new Date();
    const diff = d - now;

    if (diff < -7200000) return null;
    if (diff < 0) return 'Live now';

    const m = Math.floor(diff / 60000);
    const h = Math.floor(m / 60);

    if (m < 60) return 'in ' + m + 'm';
    if (h < 24) return 'in ' + h + 'h ' + (m % 60) + 'm';

    return d.toLocaleDateString('en-GB', {
      weekday: 'short',
      month: 'short',
      day: 'numeric',
      hour: '2-digit',
      minute: '2-digit'
    });
  }

  function isSoon(iso) {
    if (!iso) return false;
    const diff = new Date(iso) - new Date();
    return diff > 0 && diff < 1800000;
  }

  function parseMatches(html) {
    const tmp = document.createElement('div');
    tmp.innerHTML = html;

    const seen = new Set();
    const matches = [];

    tmp.querySelectorAll('.match-info').forEach(card => {
      const timer = card.querySelector('[data-timestamp]');
      const ts = timer ? parseInt(timer.getAttribute('data-timestamp')) : null;
      const dateISO = ts ? new Date(ts * 1000).toISOString() : null;

      const opps = card.querySelectorAll('.match-info-header-opponent');
      const t1 = opps[0]?.textContent?.trim() || 'TBD';
      const t2 = opps[1]?.textContent?.trim() || 'TBD';

      const scores = card.querySelectorAll('.match-info-header-scoreholder-score');
      const s1 = scores[0]?.textContent?.trim();
      const s2 = scores[1]?.textContent?.trim();

      const s1Num = parseInt(s1);
      const s2Num = parseInt(s2);
      const hasScore = !isNaN(s1Num) && !isNaN(s2Num);

      const tourn = card.querySelector('.match-info-tournament-name')?.textContent?.trim() || '';

      const streamEl = card.querySelector('a[href*="Stream/twitch"]');
      let stream = null;
      if (streamEl) {
        const m = (streamEl.getAttribute('href') || '').match(/Stream\/twitch\/([^"&?\/]+)/);
        if (m) stream = 'https://twitch.tv/' + m[1];
      }

      const now = new Date();
      const matchDate = dateISO ? new Date(dateISO) : null;

      const diffPast = matchDate ? (now - matchDate) : null;
      const diffFuture = matchDate ? (matchDate - now) : null;

      // ------------------------
      // ✅ NEW RELIABLE LOGIC
      // ------------------------

      const isUpcoming = matchDate && diffFuture > 0;

      // LIVE → started, not too old, and not clearly finished
      const isLive =
        matchDate &&
        diffPast >= 0 &&
        diffPast < 6 * 60 * 60 * 1000 && // allow longer series
        (
          !hasScore ||                  // no score yet
          s1Num === s2Num ||            // tied
          Math.abs(s1Num - s2Num) <= 1  // ongoing series (1-0, 2-1 etc)
        );

      // COMPLETED → must NOT be live AND has score AND enough time passed
      const isCompleted =
        hasScore &&
        matchDate &&
        diffPast > 60 * 60 * 1000 && // give more buffer (1h)
        !isLive;

      // Skip old entries (keep completed for 3 days)
      if (matchDate && diffPast > 3 * 24 * 60 * 60 * 1000) return;

      const key = t1 + '|' + t2 + '|' + (ts || '');
      if (seen.has(key)) return;
      seen.add(key);

      matches.push({
        t1, t2,
        s1, s2,
        dateISO,
        tourn,
        stream,
        isLive,
        isCompleted,
        isUpcoming
      });
    });

    return matches;
  }

  function dismissMatch(id) {
    dismissed.add(id);
    saveDismissed();

    const el = document.querySelector('[data-match-id="' + CSS.escape(id) + '"]');
    if (el) {
      el.style.transition = 'opacity 0.2s, max-height 0.3s';
      el.style.opacity = '0';
      el.style.maxHeight = '0';
      setTimeout(() => el.remove(), 300);
    }
    }
  function openStream(url, matchLabel) {
    const panel = document.getElementById('stream-panel');
    const frame = document.getElementById('stream-frame');
    const label = document.getElementById('stream-label');

    const channel = url.split('/').pop();

    // Use localhost as parent — file must be served via local server
    // e.g.:  python -m http.server 8000
    const host = location.hostname || 'officialheartseeker.github.io';

    label.textContent = matchLabel || ('Stream: ' + channel);
    frame.src = `https://player.twitch.tv/?channel=${channel}&parent=${host}`;
    panel.classList.remove('hidden');
    panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function toggleFullscreen() {
    const panel = document.getElementById('stream-panel');
    panel.classList.toggle('fullscreen');
  }

  function closeStream() {
    const panel = document.getElementById('stream-panel');
    const frame = document.getElementById('stream-frame');
    frame.src = '';
    panel.classList.remove('fullscreen');
    panel.classList.add('hidden');
  }
  function renderMatch(m, i) {
    const id = matchId(m);
    if (dismissed.has(id)) return '';

    const timeStr = formatTime(m.dateISO);
    const soon = isSoon(m.dateISO);

    let s1 = parseInt(m.s1);
    let s2 = parseInt(m.s2);
    const hasScore = !isNaN(s1) && !isNaN(s2);

    let scoreHtml = '';
    if (hasScore || m.isLive) {
      if (!hasScore) { s1 = 0; s2 = 0; }
      scoreHtml = `<span class="score ${s1 > s2 ? 'winner' : ''}">${s1}</span>
                  <span class="score-sep">:</span>
                  <span class="score ${s2 > s1 ? 'winner' : ''}">${s2}</span>`;
    } else {
      scoreHtml = `<span class="vs">vs</span>`;
    }

    const metaHtml =
      (m.isLive ? `<span class="live-badge">● LIVE</span>` : '') +
      (timeStr ? `<span class="time-tag ${soon ? 'soon' : ''}">${timeStr}</span>` : '') +
      (m.tourn ? `<span class="tourn-tag">${m.tourn}</span>` : '') +
    (m.stream ? `<button class="stream-btn" onclick="openStream('${m.stream}', '${m.t1.replace(/'/g, "\\'")} vs ${m.t2.replace(/'/g, "\\'")}')">▶ Watch</button>` : '')

    const rowClass = m.isLive
      ? 'is-live'
      : m.isCompleted
      ? 'is-completed'
      : 'is-upcoming';

  return `
    <div class="match-row ${rowClass}" data-match-id="${id}">
      <div class="match-teams">
        <span class="team-name left ${m.t1 === 'TBD' ? 'tbd' : ''}">
          ${m.t1 !== 'TBD' ? `<a href="https://liquipedia.net/dota2/${encodeURI(m.t1.replace(/ /g, '_'))}" target="_blank" class="team-link">${m.t1}</a>` : m.t1}
        </span>
        <div class="score-center">${scoreHtml}</div>
        <span class="team-name right ${m.t2 === 'TBD' ? 'tbd' : ''}">
          ${m.t2 !== 'TBD' ? `<a href="https://liquipedia.net/dota2/${encodeURI(m.t2.replace(/ /g, '_'))}" target="_blank" class="team-link">${m.t2}</a>` : m.t2}
        </span>
      </div>
      <div class="match-meta">${metaHtml}</div>
      <button class="dismiss-btn" onclick="dismissMatch('${id}')">✕</button>
    </div>
  `;
}
  function renderAll(matches) {
    const live = matches.filter(m => m.isLive && !dismissed.has(matchId(m)));
    const upcoming = matches.filter(m => m.isUpcoming && !dismissed.has(matchId(m)));
    const completed = matches.filter(m => m.isCompleted && !dismissed.has(matchId(m)));

    let html = '';

    if (live.length) {
      html += `<div class="section-divider live-section">
        <div class="dot"></div>Live<span class="cnt">${live.length}</span><div class="line"></div></div>`;
      html += live.map(renderMatch).join('');
    }

    if (upcoming.length) {
      html += `<div class="section-divider upcoming-section">
        <div class="dot"></div>Upcoming<span class="cnt">${upcoming.length}</span><div class="line"></div></div>`;
      html += upcoming.map(renderMatch).join('');
    }

    if (completed.length) {
      html += `<div class="section-divider completed-section">
        <div class="dot"></div>Completed<span class="cnt">${completed.length}</span><div class="line"></div></div>`;
      html += completed.map(renderMatch).join('');
    }

    if (!html) {
      return `<div class="empty-state">No matches right now.</div>`;
    }

    return html;
  }

  function loadMatches() {
    const btn = document.getElementById('refresh-btn');
    btn.classList.add('spinning');

    const xhr = new XMLHttpRequest();
    xhr.open('GET', API);

    xhr.onload = function() {
      btn.classList.remove('spinning');

      try {
        const data = JSON.parse(xhr.responseText);
        const html = data?.parse?.text?.['*'];

        if (!html) throw new Error('No data');

        const matches = parseMatches(html);

        document.getElementById('match-body').innerHTML = renderAll(matches);
        document.getElementById('updated-text').innerHTML =
          '<strong>' + new Date().toLocaleTimeString('en-GB') + '</strong>';

      } catch (e) {
        document.getElementById('match-body').innerHTML =
          `<div class="error-state">⚠ ${e.message}</div>`;
      }
    };

    xhr.onerror = function() {
      btn.classList.remove('spinning');
      document.getElementById('match-body').innerHTML =
        `<div class="error-state">⚠ Network error</div>`;
    };

    xhr.send();
  }

  loadMatches();
  setInterval(loadMatches, 60000);
</script>
</body>
</html>
