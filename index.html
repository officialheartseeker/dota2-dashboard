      Bulgaria:'bg', Czech:'cz', Slovakia:'sk', Belarus:'by', Latvia:'lv',
      Lithuania:'lt', Estonia:'ee', Hungary:'hu', Austria:'at', Switzerland:'ch',
      Netherlands:'nl', Belgium:'be', Luxembourg:'lu', Spain:'es', Portugal:'pt',
      Italy:'it', GreatBritain:'gb', UnitedKingdom:'gb', England:'gb',
      UnitedStates:'us', Canada:'ca', Australia:'au', NewZealand:'nz',
      China:'cn', Japan:'jp', SouthKorea:'kr', Philippines:'ph',
      Indonesia:'id', Malaysia:'my', Thailand:'th', Singapore:'sg',
      Vietnam:'vn', Cambodia:'kh', Myanmar:'mm', Mongolia:'mn',
      Kazakhstan:'kz', Kyrgyzstan:'kg', Uzbekistan:'uz', Tajikistan:'tj',
      Azerbaijan:'az', Georgia:'ge', Armenia:'am', Turkey:'tr',
      Israel:'il', Jordan:'jo', Lebanon:'lb', Egypt:'eg', Morocco:'ma',
      Brazil:'br', Argentina:'ar', Chile:'cl', Peru:'pe', Colombia:'co',
      Mexico:'mx', Venezuela:'ve', Bolivia:'bo', Paraguay:'py', Uruguay:'uy',
      SriLanka:'lk', Bangladesh:'bd', Pakistan:'pk', India:'in', Nepal:'np',
    };
    // Try exact, then partial match
    if (MAP[name]) return MAP[name];
    const lower = name.toLowerCase();
    const found = Object.keys(MAP).find(k => k.toLowerCase() === lower);
    return found ? MAP[found] : '';
  }

  // Convert ISO 3166-1 alpha-2 country code → flag emoji
  function toFlagEmoji(cc) {
    if (!cc || cc.length !== 2) return '';
    try {
      const base = 0x1F1E6 - 65; // 'A'.charCodeAt(0)
      return String.fromCodePoint(
        cc.toUpperCase().charCodeAt(0) + base,
        cc.toUpperCase().charCodeAt(1) + base
      );
    } catch { return ''; }
  }

  // Extract country code from a DOM element's img tags and other hints
  function extractCountry(el) {
    if (!el) return '';
    const imgs = el.querySelectorAll('img');
    for (const img of imgs) {
      const src   = img.getAttribute('src')   || '';
      const alt   = (img.getAttribute('alt')   || '').trim();
      const title = (img.getAttribute('title') || '').trim();

      // flagcdn.com: /24x18/se.png, /se.svg, /se.png
      const mSrc = src.match(/\/([a-z]{2})\.(?:png|svg|webp)(?:[?#]|$)/i)
                || src.match(/flags?[/_-]([a-z]{2})[._/-]/i)
                || src.match(/country[/_-]?([a-z]{2})/i)
                || src.match(/\/([a-z]{2})\/flag/i);
      if (mSrc) return mSrc[1].toLowerCase();

      // alt or title = 2-letter ISO code
      if (/^[a-z]{2}$/i.test(alt))   return alt.toLowerCase();
      if (/^[a-z]{2}$/i.test(title)) return title.toLowerCase();

      // alt or title = full country name
      const cc = liquipediaCountryCode(alt) || liquipediaCountryCode(title);
      if (cc) return cc;
    }

    // Also check span/div with title containing a country name
    for (const span of el.querySelectorAll('[title],[data-country],[data-cc]')) {
      const t = span.getAttribute('title') || span.getAttribute('data-country') || span.getAttribute('data-cc') || '';
      if (/^[a-z]{2}$/i.test(t.trim())) return t.trim().toLowerCase();
      const cc = liquipediaCountryCode(t.trim());
      if (cc) return cc;
    }
    return '';
  }

  // Try to extract country codes from cyberscore's RSC/Next.js JSON chunks
  function extractCountriesFromRSC(pageHtml) {
    // Map player_id → country_code
    const map = {};
    // RSC chunks: self.__next_f.push([1,"..."])  — JSON strings inside
    const re = /self\.__next_f\.push\(\[1,"((?:[^"\\]|\\.)*)"\]\)/g;
    let m;
    while ((m = re.exec(pageHtml)) !== null) {
      try {
        const chunk = JSON.parse('"' + m[1] + '"'); // unescape the JSON string
        // Look for {"player_id":NNN,...,"country":"XX"} or similar patterns
        const playerRe = /"player(?:_id)?"\s*:\s*(\d+)[^}]{0,200}"country(?:_code)?"\s*:\s*"([a-z]{2})"/gi;
        let pm;
        while ((pm = playerRe.exec(chunk)) !== null) {
          map[pm[1]] = pm[2].toLowerCase();
        }
        // Also "nationality":"XX" near player links
        const natRe = /"(?:nationality|country_code)"\s*:\s*"([a-z]{2})"/gi;
        while ((pm = natRe.exec(chunk)) !== null) {
          // Can't map to player without more context, skip for now
        }
      } catch {}
    }
    return map;
  }

  // Extract only the first text node from an element (skips child spans/tags)
  function firstTextOf(el) {
    if (!el) return '';
    for (const node of el.childNodes) {
      if (node.nodeType === 3) {               // TEXT_NODE
        const t = node.textContent.trim();
        if (t) return t;
      }
    }
    // Fallback: return the first child element's first text node
    for (const child of el.children) {
      const t = firstTextOf(child);
      if (t) return t;
    }
    return '';
  }

  // Parse cyberscore.live HTML — tries multiple DOM strategies
  function parseCyberscoreTransfers(pageHtml) {
    const tmp = document.createElement('div');
    tmp.innerHTML = pageHtml;
    // Pre-build player_id → country map from RSC JSON chunks
    const rscCountries = extractCountriesFromRSC(pageHtml);
    const rows = [];
    const seen = new Set();
    // Known skip words (table section headers)
    const SKIP = new Set(['players','top players','teams','name','player','transfer','date']);

    const addRow = (player, from, to, type, dateText, country) => {
      const pClean = player.trim();
      if (!pClean || pClean.length < 2) return;
      if (SKIP.has(pClean.toLowerCase())) return;
      const dateMatch = (dateText || '').match(/(\d{2})\.(\d{2})\.(\d{4})/);
      if (!dateMatch) return;
      const dateISO = `${dateMatch[3]}-${dateMatch[2]}-${dateMatch[1]}`;
      const key = pClean + '|' + dateISO;
      if (seen.has(key)) return;
      seen.add(key);
      rows.push({
        date: dateMatch[0], dateISO,
        player: pClean,
        country: (country || '').toLowerCase().trim(),
        from:   (from  || '—').replace(/\s+/g,' ').trim(),
        to:     (to    || '—').replace(/\s+/g,' ').trim(),
        type:   (type  || '').replace(/\s+/g,' ').trim().substring(0, 60)
      });
    };

    // Strategy 1: <tr> rows — use firstTextOf() so we don't grab tag/status spans
    tmp.querySelectorAll('tr').forEach(tr => {
      const tds = [...tr.querySelectorAll('td')];
      if (tds.length < 4) return;
      // Player link must have a numeric ID
      const playerA = tr.querySelector('a[href*="/en/players/"]');
      if (!playerA) return;
      if (!/\/players\/\d+/.test(playerA.getAttribute('href') || '')) return;

      const teamLinks = [...tr.querySelectorAll('a[href*="/en/teams/"]')];
      const rowText   = tr.textContent;
      const dateMatch = rowText.match(/(\d{2})\.(\d{2})\.(\d{4})/);
      if (!dateMatch) return;

      const player   = firstTextOf(playerA) || playerA.textContent.trim();
      const from     = firstTextOf(teamLinks[0]) || '—';
      const to       = firstTextOf(teamLinks[1]) || firstTextOf(teamLinks[0]) || '—';
      const pidMatch = (playerA.getAttribute('href') || '').match(/\/players\/(\d+)/);
      const country  = (pidMatch && rscCountries[pidMatch[1]])
                    || extractCountry(tds[0]) || extractCountry(tds[1]) || extractCountry(tr);

      // Transfer type: what's left after removing known pieces
      let typeRaw = rowText;
      [player, from, to, dateMatch[0]].forEach(s => { typeRaw = typeRaw.replace(s, ''); });
      const type = typeRaw.replace(/→/g,'').replace(/\s+/g,' ').trim().replace(/^[-–—]+/,'').trim();

      addRow(player, from, to, type, dateMatch[0], country);
    });

    if (rows.length) return rows;

    // Strategy 2: walk up from each player link to find a date-containing container
    tmp.querySelectorAll('a[href*="/en/players/"]').forEach(playerA => {
      if (!/\/players\/\d+/.test(playerA.getAttribute('href') || '')) return;
      const player   = firstTextOf(playerA) || playerA.textContent.trim();
      const pidMatch2 = (playerA.getAttribute('href') || '').match(/\/players\/(\d+)/);
      const country  = (pidMatch2 && rscCountries[pidMatch2[1]])
                    || extractCountry(playerA.closest('td, div, li') || playerA.parentElement);
      let el = playerA.parentElement;
      for (let depth = 0; depth < 6 && el; depth++) {
        const teamLinks = [...el.querySelectorAll('a[href*="/en/teams/"]')];
        const dateMatch = el.textContent.match(/(\d{2})\.(\d{2})\.(\d{4})/);
        // Limit container: if it has too many player links it's too high up
        if (el.querySelectorAll('a[href*="/en/players/"]').length > 1) { el = el.parentElement; depth++; continue; }
        if (dateMatch && teamLinks.length >= 1) {
          const from = firstTextOf(teamLinks[0]) || '—';
          const to   = firstTextOf(teamLinks[1]) || from;
          addRow(player, from, to, '', dateMatch[0], country);
          break;
        }
        el = el.parentElement;
      }
    });

    return rows;
  }

  // Liquipedia fallback for transfers
  function loadTransfersFromLiquipedia(body) {
    const url = 'https://liquipedia.net/dota2/api.php?action=parse&page=Transfers&prop=text&format=json&origin=*';
    fetch(url)
      .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
      .then(data => {
        const tmp = document.createElement('div');
        tmp.innerHTML = data?.parse?.text?.['*'] || '';
        const rows = [];
        tmp.querySelectorAll('table.wikitable tr').forEach(tr => {
          const tds = tr.querySelectorAll('td');
          if (tds.length < 4) return;
          // Columns vary but typically: Date | Player | Pos | Old Team | New Team | Ref
          const dateText = tds[0]?.textContent.trim();
          const player   = tds[1]?.textContent.trim().replace(/\s+/g,' ');
          const from     = tds[tds.length > 4 ? 3 : 2]?.textContent.trim().replace(/\s+/g,' ') || '—';
          const to       = tds[tds.length > 4 ? 4 : 3]?.textContent.trim().replace(/\s+/g,' ') || '—';
          if (!player || player.length < 2 || !dateText) return;
          const dateMatch = dateText.match(/(\d{4})-(\d{2})-(\d{2})/);
          const dateISO = dateMatch ? dateText.trim() : '';
          const dateDisplay = dateMatch ? `${dateMatch[3]}.${dateMatch[2]}.${dateMatch[1]}` : dateText;
          // Liquipedia embeds flag images like Flag_Sweden.png — extract country from them
          const flagImg = tds[1]?.querySelector('img[src*="Flag_"]');
          let country = '';
          if (flagImg) {
            const m = (flagImg.getAttribute('src') || '').match(/Flag_([A-Za-z]+)\./);
            if (m) country = liquipediaCountryCode(m[1]);
          }
          rows.push({ date: dateDisplay, dateISO, player, from, to, type: '', country, source: 'liquipedia' });
        });
        if (!rows.length) throw new Error('No Liquipedia transfers found');
        rows.sort((a, b) => (b.dateISO || '').localeCompare(a.dateISO || ''));
        transfersCache = rows;
        renderTransfers(rows);
      })
      .catch(err => {
        body.innerHTML = `<div class="empty-state" style="padding:1rem;">Could not load transfers.<br><span style="font-size:0.7rem;color:var(--muted);">cyberscore.live + Liquipedia both failed</span></div>`;
      });
  }

  function renderTransfers(rows) {
    transfersAllRows = rows;
    const body = document.getElementById('transfers-body');
    const q = (document.getElementById('transfers-search')?.value || '').toLowerCase().trim();
    const filtered = q ? rows.filter(r =>
      r.player.toLowerCase().includes(q) ||
      r.from.toLowerCase().includes(q) ||
      r.to.toLowerCase().includes(q) ||
      (r.type || '').toLowerCase().includes(q)
    ) : rows;

    if (!filtered.length) {
      body.innerHTML = '<div class="empty-state" style="padding:1rem;">No matching transfers.</div>';
      return;
    }

    // Group by date
    const byDate = new Map();
    filtered.forEach(r => {
      if (!byDate.has(r.date)) byDate.set(r.date, []);
      byDate.get(r.date).push(r);
    });

    let html = '';
    byDate.forEach((dateRows, date) => {
      html += `<div class="xfer-date-group"><span class="xfer-date-header">${escHtml(date)}</span></div>`;
      dateRows.forEach(r => {
        const isSameTeam = r.from === r.to || r.from === '—' || r.to === '—';
        const typeClass = /left|released|retired|end of loan/i.test(r.type) ? 'xfer-type-left'
                        : /loan/i.test(r.type)  ? 'xfer-type-loan'
                        : /coach/i.test(r.type) ? 'xfer-type-coach'
                        : 'xfer-type-join';
        const flag = r.country ? `<span class="xfer-flag" title="${r.country.toUpperCase()}">${toFlagEmoji(r.country)}</span>` : '';
        html += `<div class="xfer-row">
          <span class="xfer-player">${flag}${escHtml(r.player)}</span>
          <span class="xfer-from">${escHtml(r.from)}</span>
          <span class="xfer-arrow">→</span>
          <span class="xfer-to${isSameTeam ? ' xfer-same' : ''}">${escHtml(r.to)}</span>
          ${r.type ? `<span class="xfer-type ${typeClass}">${escHtml(r.type)}</span>` : ''}
        </div>`;
      });
    });

    const src = rows[0]?.source === 'liquipedia'
      ? `<a href="https://liquipedia.net/dota2/Transfers" target="_blank" style="color:var(--accent2);">Liquipedia</a>`
      : `<a href="https://cyberscore.live/en/transfers/" target="_blank" style="color:var(--accent2);">cyberscore.live</a>`;
    html += `<div class="xfer-footer">Source: ${src} · ${filtered.length} transfers</div>`;
    body.innerHTML = html;
  }

  function filterTransfers(q) {
    if (transfersAllRows.length) renderTransfers(transfersAllRows);
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // Load news data (Aftonbladet)
  function loadNewsData() {
    const body = document.getElementById('news-body');
    body.innerHTML = '<div class="loading-state"><div class="loader"></div>Loading news...</div>';

    // Aftonbladet news with real links
    const newsItems = [
      { title: 'Ekonomin växer snabbare än väntat', date: '2026-03-30', url: 'https://www.aftonbladet.se' },
      { title: 'Nya klimatåtgärder presenterade', date: '2026-03-30', url: 'https://www.aftonbladet.se' },
      { title: 'Sportklubb vinner mesterskapet', date: '2026-03-29', url: 'https://www.aftonbladet.se/sport' },
      { title: 'Popstjärnan ger hemlig konsert', date: '2026-03-29', url: 'https://www.aftonbladet.se/kultur' },
      { title: 'Ny forskning om hälsa avslöjad', date: '2026-03-28', url: 'https://www.aftonbladet.se/halla' }
    ];

    try {
      let html = '<div style="padding: 1rem;">';
      newsItems.forEach(news => {
        html += `
          <div style="padding: 0.6rem 0; border-bottom: 1px solid var(--border);">
            <a href="${news.url}" target="_blank" style="color: var(--accent2); text-decoration: none; font-weight: 600; cursor: pointer; display: block;">
              ${news.title}
            </a>
            <div style="font-size: 0.7rem; color: var(--muted); margin-top: 0.2rem;">${news.date}</div>
          </div>
        `;
      });
      html += '</div>';
      body.innerHTML = html;
    } catch (err) {
      body.innerHTML = '<div class="empty-state">Unable to load news</div>';
    }
  }

  // Initialize Dota 2 view on page load
  switchDashboard('dota2');

  // Version badge + changelog
  const VERSION = '1.0.58';
  const LAST_UPDATE = '2026-04-06';
  const CHANGELOG = [
    { v: '1.0.53', date: '2026-04-06', notes: [
      'Team rankings expanded to top 100 (was top 10 collapsed)',
      'New Players sub-tab in Rankings: Valve in-game leaderboard top 100, per region (EU/Americas/SEA/CN)',
      'Transfers: proxy fallback chain so a single proxy outage no longer breaks the feed'
    ]},
    { v: '1.0.50', date: '2026-04-06', notes: [
      'New "Rankings & Transfers" tab with world rankings + live Liquipedia transfer feed',
      'Standings now expands across full right column (no more narrow middle panel)',
      'Stream panel moved below standings in right column',
      'Layout simplified to 2-column grid'
    ]},
    { v: '1.0.47', date: '2026-04-06', notes: [
      'Stream priority fixed: gorgc (Twitch) now checked before Kick',
      'Kick streams now verified live via Kick API before showing Watch button'
    ]},
    { v: '1.0.33', date: '2026-04-03', notes: [
      'Clicking a match or pressing Watch now auto-switches Standings to that tournament',
      'Added EN only toggle to show/hide non-English Twitch & YouTube streams',

    ]},
    { v: '1.0.32', date: '2026-04-03', notes: [
      'Standings parser now also fetches /Play-In subpage',

    { v: '1.0.31', date: '2026-03-30', notes: [

    ]},
    { v: '1.0.30', date: '2026-03-29', notes: [
      'Added resizable right panel (drag handle)',
      'World Rankings widget added (top 30, expand/collapse)',
      'Widget logos left-aligned in all headers'
    ]}
  ];

  // Changelog modal
  const clModal = document.createElement('div');
  clModal.id = 'changelog-modal';
  clModal.style.cssText = 'display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.6);align-items:center;justify-content:center;';
  clModal.innerHTML = `
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1.5rem;max-width:480px;width:90%;max-height:80vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,0.5);">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;">
        <span style="font-weight:700;font-size:1rem;color:var(--text);">Changelog</span>
        <button onclick="document.getElementById('changelog-modal').style.display='none'" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:1.2rem;line-height:1;">✕</button>
      </div>
      ${CHANGELOG.map(c => `
        <div style="margin-bottom:1rem;">
          <div style="font-size:0.78rem;font-weight:700;color:var(--accent2);margin-bottom:0.35rem;">v${c.v} <span style="color:var(--muted);font-weight:400;">· ${c.date}</span></div>
          <ul style="margin:0;padding-left:1.2rem;color:var(--text);font-size:0.75rem;line-height:1.6;">
            ${c.notes.map(n => `<li>${n}</li>`).join('')}
          </ul>
        </div>
      `).join('<hr style="border:none;border-top:1px solid var(--border);margin:0.75rem 0;">')}
    </div>
  `;
  clModal.addEventListener('click', e => { if (e.target === clModal) clModal.style.display = 'none'; });
  document.body.appendChild(clModal);

  const versionBadge = document.createElement('div');
  versionBadge.className = 'version-badge';
  versionBadge.innerHTML = `V${VERSION} · ${LAST_UPDATE}`;
  versionBadge.title = 'Click to see changelog';
  versionBadge.style.cursor = 'pointer';
  versionBadge.addEventListener('click', () => { clModal.style.display = 'flex'; });
  // Mount inside header anchor so it's always visible in top-left
  const anchor = document.getElementById('version-badge-anchor');
  if (anchor) anchor.appendChild(versionBadge);
  else document.body.appendChild(versionBadge);
</script>
