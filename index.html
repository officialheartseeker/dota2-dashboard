<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="referrer" content="no-referrer"/>
  <title>Dota 2 · Match Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>

    :root {
      --bg: #0a0c10;
      --surface: #111418;
      --card: #161b22;
      --border: #21262d;
      --accent: #c8392b;
      --accent2: #e8872a;
      --live: #22c55e;
      --upcoming: rgb(180, 192, 16);
      --completed: rgba(209, 22, 22, 0.938);
      --text: #e6edf3;
      --muted: #7d8590;
      --fav: #f59e0b;
    }

    * { margin:0; padding:0; box-sizing:border-box; }
    .main-header {
      grid-column: 1 / -1;
      grid-row: 1;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      border-bottom: 1px solid var(--border);
    }

    .main-logo {
      font-family: 'Rajdhani', sans-serif;
      font-weight: 700;
      font-size: 2.4rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text);
      text-align: center;
      padding: 0.5rem 0 0.8rem;
    }

    .main-logo span {
      color: var(--accent);
    }

    .dashboard-nav {
      display: flex;
      gap: 1.2rem;
      padding: 0.5rem 0;
      align-items: center;
      justify-content: center;
    }

    .dashboard-nav button {
      background: none;
      border: none;
      color: var(--muted);
      padding: 0.3rem 0.6rem;
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: all 0.2s;
      border-bottom: 2px solid transparent;
    }

    .dashboard-nav button:hover {
      color: var(--text);
    }

    .dashboard-nav button.active {
      color: var(--accent2);
      border-bottom-color: var(--accent2);
    }

    /* Hide ALL and CUSTOM buttons - focus on Dota 2 only */
    .dashboard-nav button[data-view="all"],
    .dashboard-nav button[data-view="custom"] {
      display: none;
    }

    /* Hide custom view widget selector */
    .widget-selector {
      display: none !important;
    }

    /* Version badge - top-left corner inside header */
    .version-badge {
      display: inline-block;
      font-size: 0.68rem;
      color: var(--muted);
      background: rgba(255,255,255,0.04);
      padding: 0.3rem 0.55rem;
      border-radius: 3px;
      border: 1px solid var(--border);
      white-space: nowrap;
      font-family: 'IBM Plex Mono', monospace;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }
    .version-badge:hover {
      color: var(--text);
      border-color: var(--accent2);
    }

    /* Accent på ett ord (valfritt) */
    .main-logo span {
      color: var(--accent);
    }
    /* Scale base font-size with screen width: 14px at 1280px → 18px at 2560px */
    html {
      font-size: clamp(11px, calc(9.5px + 0.24vw), 16px);
    }
    .team-link {
      color: inherit;
      text-decoration: none;
    }
    .team-link:hover {
      text-decoration: underline;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'IBM Plex Mono', monospace;
      min-height: 100vh;
      padding: 1.5rem;

      display: grid;
      grid-template-columns: var(--sidebar-width, 30%) 1fr;
      grid-template-rows: auto 1fr;
      gap: 1.25rem;
      align-items: start;
    }

    /* Matches panel — left column */
    #dota-widget {
      grid-column: 1;
      grid-row: 2;
    }

    /* Right column: standings + stream stacked */
    .all-widgets-right {
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
      grid-column: 2;
      grid-row: 2;
      min-width: 0;
    }

    /* Ensure all-widgets-right children don't break flex layout */
    .all-widgets-right > * {
      grid-column: auto !important;
      grid-row: auto !important;
    }

    /* Rankings & Transfers full-width tab panel */
    #rankings-transfers-panel {
      display: none;
      grid-column: 1 / -1;
      grid-row: 2;
      gap: 1.25rem;
      align-items: start;
    }
    body.rankings-transfers-view #rankings-transfers-panel {
      display: grid;
      grid-template-columns: 320px 1fr;
    }
    body.rankings-transfers-view #dota-widget,
    body.rankings-transfers-view .all-widgets-right {
      display: none !important;
    }

    /* Stream panel inside the right flex column */
    .all-widgets-right .stream-panel {
      flex-shrink: 0;
    }

    /* ── TRANSFERS ── */
    .transfers-filter {
      display: flex;
      padding: 0.45rem 0.6rem;
      border-bottom: 1px solid var(--border);
      background: var(--card);
    }
    .transfers-filter input {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.25rem 0.5rem;
      border-radius: 4px;
      font-size: 0.75rem;
      font-family: 'IBM Plex Mono', monospace;
      flex: 1;
    }
    .transfers-filter input:focus { outline: none; border-color: var(--accent2); }

    .xfer-date-group {
      padding: 0.3rem 0.7rem;
      background: rgba(232,135,42,0.07);
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      margin-top: 0.15rem;
    }
    .xfer-date-group:first-child { margin-top: 0; border-top: none; }
    .xfer-date-header {
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--accent2);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    /* Each transfer row: grid — player | from | arrow | to | type-badge */
    .xfer-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1.2rem 1fr auto;
      align-items: center;
      gap: 0 0.4rem;
      padding: 0.35rem 0.7rem;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.85rem;
      transition: background 0.1s;
    }
    .xfer-row:hover { background: rgba(255,255,255,0.03); }

    .xfer-flag {
      margin-right: 0.3rem;
      font-size: 0.85rem;
      line-height: 1;
      vertical-align: middle;
    }
    .xfer-player {
      font-weight: 700;
      color: #b388ff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .xfer-from {
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-weight: 600;
    }
    .xfer-arrow {
      color: var(--muted);
      text-align: center;
      font-size: 0.75rem;
    }
    .xfer-to {
      color: var(--live);
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .xfer-to.xfer-same { color: var(--muted); font-weight: 600; }

    .xfer-type {
      font-size: 0.62rem;
      font-family: 'IBM Plex Mono', monospace;
      padding: 0.1rem 0.35rem;
      border-radius: 3px;
      white-space: nowrap;
      background: rgba(255,255,255,0.06);
      color: var(--muted);
    }
    .xfer-type-join  { background: rgba(34,197,94,0.12);  color: var(--live); }
    .xfer-type-left  { background: rgba(200,57,43,0.12);  color: var(--accent); }
    .xfer-type-loan  { background: rgba(232,135,42,0.15); color: var(--accent2); }
    .xfer-type-coach { background: rgba(167,139,250,0.15);color: #a78bfa; }

    .xfer-footer {
      padding: 0.45rem 0.7rem;
      font-size: 0.65rem;
      color: var(--muted);
      border-top: 1px solid var(--border);
      font-family: 'IBM Plex Mono', monospace;
    }

    /* ── RESIZE HANDLE (integrated in widget right edge) ── */
    .widget {
      position: relative;
    }
    .resize-handle {
      position: absolute;
      top: 0;
      right: -4px;
      bottom: 0;
      width: 8px;
      cursor: col-resize;
      z-index: 10;
    }
    .resize-handle::after {
      content: '';
      position: absolute;
      right: 3px;
      top: 0;
      bottom: 0;
      width: 2px;
      background: var(--border);
      transition: background 0.15s, width 0.15s;
    }
    .resize-handle:hover::after,
    .resize-handle.dragging::after {
      background: var(--accent);
      width: 3px;
    }

    /* ── STREAM PANEL ── */
    .stream-panel {
      background: var(--surface);
      border: 1px solid #9147ff44;
      border-radius: 6px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .stream-panel.hidden { display: none; }
    .stream-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.5rem 1rem;
      background: var(--card);
      border-bottom: 1px solid var(--border);
    }
    .stream-info {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      min-width: 0;
    }
    .stream-live-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #9147ff;
      animation: blink 1.2s step-end infinite;
      flex-shrink: 0;
    }
    .stream-label {
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .stream-actions {
      display: flex;
      gap: 0.4rem;
      flex-shrink: 0;
    }
    .stream-actions button {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      cursor: pointer;
      padding: 0.25rem 0.6rem;
      border-radius: 3px;
      font-size: 0.75rem;
      font-family: 'IBM Plex Mono', monospace;
      transition: all 0.15s;
    }
    .stream-actions button:hover {
      border-color: #9147ff;
      color: var(--text);
    }
    .stream-panel iframe {
      width: 100%;
      height: 600px;
      border: none;
      display: block;
    }
    .stream-panel.fullscreen {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 9999;
      border-radius: 0;
      grid-column: auto;
    }
    .stream-panel.fullscreen iframe {
      height: calc(100vh - 42px);
    }
    .stream-btn {
      display: block;
      padding: 4px 7px;
      font-size: 0.7rem;
      background: #9147ff;
      color: white;
      text-decoration: none;
      border-radius: 3px;
      margin-top: 6px;
      margin: 5 auto;
      transition: background 0.15s;
      border: none;
      cursor: pointer;
    }
    .stream-btn:hover { background: #772ce8; }
    .roster-player {
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.85rem;
      color: var(--text);
      display: grid;
      grid-template-columns: 5.5rem 1fr auto;
      align-items: center;
      gap: 0.5rem;
      padding: 0.3rem 0.6rem;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .roster-player:last-child {
      border-bottom: none;
    }

    .roster-player .role {
      font-size: 0.75rem;
      font-weight: 600;
      color: #b388ff;
      text-align: left;
      white-space: nowrap;
    }

    .roster-player .nick {
      font-weight: 600;
      text-align: left;
      color: #e0e0e0;
    }

    .roster-player .country {
      font-size: 0.7rem;
      color: #8a8a9a;
      text-align: right;
      white-space: nowrap;
    }

    /* ── DRAG HANDLE ── */
    .drag-handle {
      cursor: grab;
      padding: 0 0.3rem;
      color: var(--muted);
      font-size: 0.85rem;
      opacity: 0.4;
      transition: opacity 0.15s;
      user-select: none;
    }
    .drag-handle:hover { opacity: 0.9; }
    .drag-handle:active { cursor: grabbing; }

    .widget.dragging { opacity: 0.5; }
    .widget.drag-over {
      outline: 2px dashed var(--accent);
      outline-offset: -2px;
    }

    /* ── WIDGET-CONTAINER ── */
    .widget {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
      position: relative;
      min-width: 0;
    }

    .widget-header {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      padding: 0.9rem 1.1rem;
      border-bottom: 1px solid var(--border);
      position: relative;
      gap: 0.75rem;
    }
    .widget-header::after {
      content: '';
      position: absolute;
      bottom: -1px; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, var(--accent), transparent 50%);
    }

    .widget-title {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      min-width: 0;
    }
    .logo-icon {
      width: 28px; height: 28px;
      background: var(--accent);
      clip-path: polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 0.65rem;
      color: white; flex-shrink: 0;
      animation: pulse-icon 3s ease-in-out infinite;
    }
    @keyframes pulse-icon {
      0%,100% { filter: brightness(1); }
      50% { filter: brightness(1.3) drop-shadow(0 0 5px rgba(200,57,43,.6)); }
    }
    .widget-label {
      font-family: 'Rajdhani', sans-serif;
      font-size: 1.1rem; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
      white-space: nowrap;
    }
    .widget-label span { color: var(--accent); }

    .widget-actions {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-shrink: 0;
      margin-left: auto;
    }

    /* Push standings select and any standalone controls to the right */
    .standings-widget .widget-header select,
    .widget-header > select {
      margin-left: auto;
    }
    .updated-text {
      font-size: 0.7rem; color: var(--muted);
      white-space: nowrap;
    }
    .updated-text strong { color: var(--text); }

    .viewer-count {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.7rem;
      color: var(--muted);
      white-space: nowrap;
    }
    .viewer-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--live);
      box-shadow: 0 0 4px var(--live);
      animation: blink 1.5s step-end infinite;
    }
    .viewer-count strong {
      color: var(--text);
      font-variant-numeric: tabular-nums;
    }

    .icon-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.75rem;
      padding: 0.2rem 0.55rem;
      border-radius: 2px;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .icon-btn:hover { border-color: var(--accent); color: var(--text); }
    .icon-btn.spinning .spin-icon { display: inline-block; animation: spin 0.6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── TOOLBAR (filter + favorites) ── */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 0.75rem;
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }
    .toolbar select {
      background: var(--card);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 0.2rem 0.4rem;
      font-size: 0.7rem;
      font-family: 'IBM Plex Mono', monospace;
      cursor: pointer;
      flex: 1;
      min-width: 0;
    }
    .toolbar select:focus { outline: none; border-color: var(--accent); }

    /* ── MATCH LIST ── */
    .widget-body { padding: 0.2rem; }

    .match-row {
      display: grid;
      grid-template-columns: 1fr 140px;
      align-items: center;
      gap: 0.3rem;
      padding: 0.4rem 0.5rem;
      border-radius: 4px;
      border: 1px solid transparent;
      margin-bottom: 0.2rem;
      position: relative;
      transition: background 0.15s, border-color 0.15s;
      animation: fadeIn 0.3s ease both;
      cursor: pointer;
    }
    .match-row:last-child { margin-bottom: 0; }
    .match-row:hover { background: rgba(255,255,255,0.04); }
    .match-row.is-live {
      margin-top: 0.4rem;
      border-color: rgba(34,197,94,0.2);
      background: rgba(34,197,94,0.03);
    }
    .match-row::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 2px;
      border-radius: 2px 0 0 2px;
    }
    .match-row.is-completed {
      margin-top: 0.4rem;
      border-color: rgba(224, 20, 20, 0.2);
      background: rgba(34,197,94,0.03);
    }
    .match-row.is-upcoming {
      margin-top: 0.4rem;
      border-color: rgb(93, 97, 36);
      background: rgba(34,197,94,0.03);
    }
    .match-row.is-live::before { background: var(--live); }
    .match-row.is-upcoming::before { background: var(--upcoming); }
    .match-row.is-completed::before { background: var(--completed); }
    .match-row.is-fav {
      box-shadow: inset 0 0 0 1px rgba(245,158,11,0.15);
    }

    @keyframes fadeIn { from { opacity:0; transform:translateX(-6px); } to { opacity:1; transform:translateX(0); } }

    /* Teams */
    .match-teams {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 0.7rem;
      min-width: 0;
    }
    .team-name {
      font-family: 'Rajdhani', sans-serif;
      font-size: 1rem; font-weight: 700;
      color: var(--text);
      white-space: nowrap;
      flex-shrink: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      display: flex;
      align-items: center;
      gap: 0.35rem;
    }
    .team-logo {
      width: 18px;
      height: 18px;
      object-fit: contain;
      flex-shrink: 0;
    }
    .team-name.tbd {
      flex-shrink: 0;
      min-width: fit-content;
      overflow: visible;
      color: var(--muted);
      font-style: italic;
      font-weight: 400;
    }
    .team-name.left { justify-content: flex-end; text-align: right; }
    .team-name.right { justify-content: flex-start; text-align: left; }
    .team-name.is-fav { color: var(--fav); }

    .score-center {
      display: flex;
      align-items: center;
      gap: 0.25rem;
      flex-shrink: 0;
    }
    .score {
      font-family: 'Rajdhani', sans-serif;
      font-size: 1.35rem; font-weight: 700;
      color: var(--muted);
      min-width: 1ch; text-align: center;
    }
    .score.winner { color: var(--live); }
    .score-sep { font-size: 1rem; color: #6e7681; }
    .vs { font-size: 0.8rem; color: var(--muted); letter-spacing: normal; }

    /* Meta */
    .match-meta {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 0.15rem;
    }
    .live-badge {
      font-size: 0.75rem; font-weight: 600;
      letter-spacing: 0.1em;
      color: var(--live);
      animation: blink 1.2s step-end infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .time-tag { font-size: 0.75rem; color: var(--muted); }
    .time-tag.soon { color: var(--accent2); }
    .countdown { font-variant-numeric: tabular-nums; }
    .tourn-tag {
      font-size: 0.7rem; color: var(--muted);
      text-align: right;
      white-space: nowrap;
      text-decoration: none;
      display: block;
    }
    a.tourn-tag:hover {
      color: var(--accent);
      text-decoration: underline;
    }
    .bo-tag {
      font-size: 0.65rem;
      color: var(--muted);
      background: rgba(255,255,255,0.04);
      padding: 0.05rem 0.3rem;
      border-radius: 2px;
    }
    .stream-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #9147ff;
      cursor: pointer;
      flex-shrink: 0;
    }

    /* Fav star */
    .fav-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 0.9rem;
      color: #4a5060;
      padding: 0;
      line-height: 1;
      transition: color 0.15s, transform 0.15s;
    }
    .fav-btn:hover { color: var(--fav); transform: scale(1.2); }
    .fav-btn.active { color: var(--fav); }

    /* Dismiss button */
    .dismiss-btn {
      background: transparent;
      border: none;
      color: #2d333b;
      font-size: 0.85rem;
      cursor: pointer;
      padding: 0.1rem 0.25rem;
      border-radius: 2px;
      transition: color 0.15s;
      flex-shrink: 0;
      line-height: 1;
    }
    .match-row:hover .dismiss-btn { color: var(--muted); }
    .dismiss-btn:hover { color: var(--accent) !important; }

    .restore-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.7rem;
      padding: 0.2rem 0.5rem;
      border-radius: 3px;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }
    .restore-btn:hover { color: var(--text); border-color: var(--accent); }

    /* Section dividers */
    .section-divider {
      display: flex; align-items: center; gap: 0.5rem;
      padding: 0.3rem 0.75rem 0.5rem;
      font-size: 0.7rem; font-weight: 600;

      font-size: 0.7rem;
      transition: transform 0.2s;
      display: inline-block;

    .section-divider.collapsed .section-chevron {
      transform: rotate(-90deg);
    }
    .section-matches.collapsed {
      display: none;
    }
    .section-divider .dot {
      width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
    }
    .section-divider.live-section .dot { background: var(--live); box-shadow: 0 0 6px var(--live); animation: blink 1.2s step-end infinite; }
    .section-divider.completed-section .dot { background: var(--completed); }
    .section-divider.upcoming-section .dot { background: var(--upcoming); }
    .section-divider .line { flex:1; height:1px; background: var(--border); }
    .section-divider .cnt {
      font-size: 0.65rem; padding: 0.1rem 0.4rem;
      border-radius: 2px;

    /* ── INLINE ROSTER DETAIL ── */

      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;

    .roster {

      flex-direction: column;
      gap: 0.3rem;

      font-family: 'Rajdhani', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--text);
      padding-bottom: 0.25rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 0.4rem;

    .roster-title img {
      width: 16px; height: 16px;
      object-fit: contain;
    }
    .roster-player {
      font-size: 0.85rem;
      color: var(--text);
      display: grid;
      grid-template-columns: 5.5rem 1fr auto;
      align-items: center;
      gap: 0.5rem;
      padding: 0.3rem 0.6rem;
      border-bottom: 1px solid rgba(255,255,255,0.08);

      font-size: 0.75rem;
      font-weight: 600;
      color: #b388ff;
      white-space: nowrap;

    .roster-player .nick {
      color: #e0e0e0;
      font-weight: 600;
    }
    .roster-player .country {

      color: #8a8a9a;
      text-align: right;
      white-space: nowrap;
    }
    .roster-loading {
      text-align: center;
      color: var(--muted);
      font-size: 0.65rem;
      padding: 1rem;
    }

    /* States */
    .loading-state {
      display: flex; align-items: center; justify-content: center;
      gap: 0.75rem; padding: 2rem;
      color: var(--muted); font-size: 0.8rem; letter-spacing: 0.08em;

    .loader {

    .error-state {

      font-size: 0.8rem; color: var(--accent);

      border: 1px solid rgba(200,57,43,0.2);

    /* ── STANDINGS WIDGET ── */
    .standings-widget {
      background: var(--surface);
      border: 1px solid var(--border);

      overflow: hidden;

      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0.15;

    .standings-widget .widget-body {
      padding: 0.4rem;
      max-height: 80vh;
      overflow-y: auto;
    }
    .standings-table {
      width: 100%;

      font-size: 0.85rem;
    }
    .standings-table th {
      text-align: left;
      padding: 0.4rem 0.6rem;
      color: var(--muted);
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border-bottom: 1px solid var(--border);

    }
    .standings-table td {
      padding: 0.4rem 0.6rem;

    .standings-table tr:hover {
      background: rgba(255,255,255,0.04);
    }
    .standings-place {
      font-weight: 700;
      min-width: 2rem;
      text-align: center;
    }

    .standings-team {

    }
    .standings-prize {
      color: var(--live);

    }
    .standings-group-header {
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.8rem;
      font-weight: 700;

    /* Standings tabs */
    .standings-tabs {
      display: flex;
      gap: 0;
      border-bottom: 1px solid var(--border);

    .standings-tab {

      border: none;

    /* Bracket sub-tabs */

    .bracket-tab {

      border: none;

      font-weight: 600;
      padding: 0.4rem 0.7rem;

      border-bottom: 2px solid transparent;
      transition: color 0.15s, border-color 0.15s;

    .bracket-tab:hover { color: var(--text); }
    .bracket-tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    /* Bracket — horizontal, rounds as columns */
    .bracket-container {
      display: flex;
      flex-direction: row;
      gap: 0;
      overflow-x: auto;
      padding: 0 0 0.5rem;
      align-items: stretch;
    }

    .bracket-round:last-child { border-right: none; }

      font-size: 0.68rem;
      font-weight: 700;
      color: var(--accent2);
      padding: 0.3rem 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border-bottom: 1px solid var(--border);
      text-align: center;
      white-space: nowrap;
    }
    .bracket-round-matches {
      display: flex;
      flex-direction: column;
      justify-content: space-around;
      flex: 1;
      gap: 0.4rem;
      padding: 0.4rem 0.4rem;
    }
    .bracket-match {
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
    }
    .bracket-team {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.28rem 0.4rem;
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.76rem;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .bracket-team:last-child { border-bottom: none; }
    .bracket-team img {
      width: 13px; height: 13px;
      object-fit: contain; flex-shrink: 0;
    }
    .bracket-logo-placeholder { width: 13px; height: 13px; flex-shrink: 0; }
    .bracket-team-name { flex: 1; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .bracket-winner .bracket-team-name { color: var(--text); font-weight: 700; }
    .bracket-winner { background: rgba(34,197,94,0.06); }
    .bracket-score { font-weight: 700; color: var(--muted); min-width: 1rem; text-align: right; font-size: 0.75rem; }
    .bracket-score-win { color: var(--live); }
    .bracket-bo { font-size: 0.62rem; color: var(--muted); text-align: center; padding: 0.15rem; border-top: 1px solid rgba(255,255,255,0.04); background: rgba(255,255,255,0.02); }

    /* Group row status */
    .standings-table tr.row-qualified { background: rgba(34, 197, 94, 0.08); }
    .standings-table tr.row-tiebreak { background: rgba(245, 158, 11, 0.08); }
    .standings-table tr.row-eliminated { background: rgba(200, 57, 43, 0.06); opacity: 0.6; }

    /* ── RESPONSIVE ── */
    @media (max-width: 900px) {
      body {
        grid-template-columns: 1fr;
        padding: 0.75rem;
      }
      .resize-handle { display: none !important; }
      .stream-panel iframe { height: 300px; }
      .stream-panel.fullscreen iframe { height: calc(100vh - 42px); }
    }
    @media (max-width: 500px) {
      .widget-header { padding: 0.6rem 0.75rem; }
      .match-row { grid-template-columns: 1fr 100px; }
      .match-meta { width: 100px; }
      .tourn-tag { max-width: 100px; }
      .team-name { font-size: 0.8rem; }
    }

    /* ── CUSTOM VIEW WIDGET SELECTOR ── */
    .widget-selector {
      display: none;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem;
      margin-bottom: 1rem;
      gap: 0.5rem;
    }

    body.custom-view .widget-selector {
      display: flex;
      flex-direction: column;
      grid-column: 1 / -1;
      grid-row: 2;
    }

    .widget-selector-title {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--accent2);
      margin-bottom: 0.5rem;
    }

    .widget-selector-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 0.75rem;
    }

    .widget-toggle {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 0.75rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .widget-toggle:hover {
      border-color: var(--accent2);
      background: rgba(232, 135, 42, 0.1);
    }

    .widget-toggle input[type="checkbox"] {
      cursor: pointer;
      accent-color: var(--accent2);
    }

    .widget-toggle label {
      cursor: pointer;
      flex: 1;
      font-size: 0.8rem;
      color: var(--text);
    }

    /* ── RANKINGS SUB-TABS ── */
    .rankings-subtabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      background: var(--card);
    }
    .rankings-subtab {
      flex: 1;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--muted);
      padding: 0.45rem 0.5rem;
      font-size: 0.72rem;
      font-family: 'Rajdhani', sans-serif;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: all 0.15s;
    }
    .rankings-subtab:hover { color: var(--text); }
    .rankings-subtab.active { color: var(--accent2); border-bottom-color: var(--accent2); }
    .region-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 0.2rem 0.55rem;
      border-radius: 3px;
      font-size: 0.68rem;
      font-family: 'Rajdhani', sans-serif;
      font-weight: 600;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.15s;
    }
    .region-btn:hover { color: var(--text); border-color: var(--accent2); }
    .region-btn.active { background: var(--accent2); color: #000; border-color: var(--accent2); }

    /* ── RANKINGS TABLE ── */
    .rankings-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.75rem;
    }
    .rankings-table th {
      background: var(--surface);
      color: var(--accent2);
      padding: 0.5rem 0.4rem;
      text-align: left;
      font-weight: 600;
      border-bottom: 1px solid var(--border);
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }
    .rankings-table td {
      padding: 0.4rem;
      border-bottom: 1px solid var(--border);
      color: var(--text);
    }
    .rankings-table tr:hover {
      background: rgba(232, 135, 42, 0.05);
    }
    .rankings-table .rank {
      color: var(--accent2);
      font-weight: 700;
      width: 3rem;
      text-align: center;
    }
    .rankings-table .team-name {
      flex: 1;
    }
    .rankings-table .points {
      text-align: right;
      color: var(--live);
      font-weight: 600;
      width: 4rem;
    }


  </style>
</head>
<body>
  <!-- WIDGET: Main header with nav -->
  <div class="main-header">

    <div class="dashboard-nav">

  <!-- WIDGET 1: Dota 2 Matches -->

<script>
  const API = 'https://liquipedia.net/dota2/api.php?action=parse&page=Main_Page&prop=text&format=json&origin=*';
  const TEAM_API = 'https://liquipedia.net/dota2/api.php?action=parse&page={TEAM}&prop=text&format=json&origin=*';

  // ── State ──
  let dismissed = new Set(JSON.parse(sessionStorage.getItem('d2_dismissed') || '[]'));
  let favorites = new Set(JSON.parse(localStorage.getItem('d2_favorites') || '[]'));
  let allMatches = [];
  let activeFilter = '';
  let previousLiveIds = new Set();
  let notificationsEnabled = false;
  let countdownInterval = null;
  let rosterCache = {};

  function saveDismissed() {
    sessionStorage.setItem('d2_dismissed', JSON.stringify([...dismissed]));
  }
  function saveFavorites() {
    localStorage.setItem('d2_favorites', JSON.stringify([...favorites]));
  }

  function matchId(m) {
    return m.t1 + '|' + m.t2 + '|' + (m.dateISO || '');
  }

  function isFav(teamName) {
    return favorites.has(teamName.toLowerCase());
  }
  function matchHasFav(m) {
    return isFav(m.t1) || isFav(m.t2);
  }
  function toggleFav(team, event) {
    event.stopPropagation();
    const key = team.toLowerCase();
    if (favorites.has(key)) favorites.delete(key);
    else favorites.add(key);
    saveFavorites();
    renderCurrent();
  }

  // ── Notifications ──
  function enableNotifications() {
    if ('Notification' in window) {
      Notification.requestPermission().then(p => {
        notificationsEnabled = (p === 'granted');
      });
    }
  }
  enableNotifications();

  function notifyLive(m) {
    if (!notificationsEnabled) return;
    new Notification('Dota 2 Match Live!', {
      body: m.t1 + ' vs ' + m.t2 + (m.tourn ? ' — ' + m.tourn : ''),
      icon: 'https://liquipedia.net/commons/images/d/dc/Dota2_icon.png',
      tag: matchId(m)
    });
  }

  // ── Time formatting ──
  function formatTime(iso) {
    if (!iso) return null;
    const d = new Date(iso);
    const now = new Date();
    const diff = d - now;

    if (diff < -7200000) return null;
    if (diff < 0) return 'Live now';

    const m = Math.floor(diff / 60000);
    const h = Math.floor(m / 60);

    if (m < 60) return 'in ' + m + 'm';
    if (h < 24) return 'in ' + h + 'h ' + (m % 60) + 'm';

    return d.toLocaleDateString('en-GB', {
      weekday: 'short',
      month: 'short',
      day: 'numeric',
      hour: '2-digit',
      minute: '2-digit'
    });
  }

  function formatCountdown(iso) {
    if (!iso) return '';
    const diff = new Date(iso) - new Date();
    if (diff <= 0 || diff > 86400000) return '';
    const h = Math.floor(diff / 3600000);
    const m = Math.floor((diff % 3600000) / 60000);
    const s = Math.floor((diff % 60000) / 1000);
    return (h > 0 ? h + 'h ' : '') + String(m).padStart(2, '0') + 'm ' + String(s).padStart(2, '0') + 's';
  }

  function isSoon(iso) {
    if (!iso) return false;
    const diff = new Date(iso) - new Date();
    return diff > 0 && diff < 1800000;
  }
  function getFullTeamName(el) {
    if (!el) return 'TBD';

    const link = el.querySelector('a');

    // 🔥 1. PRIORITET: title (hover-text)
    if (link?.getAttribute('title')) {
      return link.getAttribute('title').trim();
    }

    // 2. fallback: vanlig text
    return el.textContent.trim();
  }
  // ── Parse ──
  function parseMatches(html) {
    const tmp = document.createElement('div');
    tmp.innerHTML = html;

    const seen = new Set();
    const matches = [];

    tmp.querySelectorAll('.match-info').forEach(card => {
      const timer = card.querySelector('[data-timestamp]');
      const ts = timer ? parseInt(timer.getAttribute('data-timestamp')) : null;
      const dateISO = ts ? new Date(ts * 1000).toISOString() : null;

      const opps = card.querySelectorAll('.match-info-header-opponent');
      const t1 = getFullTeamName(opps[0]);
      const t2 = getFullTeamName(opps[1]);

      // Extract team logos
      const logo1El = opps[0]?.querySelector('.team-template-darkmode img') || opps[0]?.querySelector('.team-template-image-icon img');
      const logo2El = opps[1]?.querySelector('.team-template-darkmode img') || opps[1]?.querySelector('.team-template-image-icon img');
      const logo1src = logo1El?.getAttribute('src') || '';
      const logo1 = logo1src.startsWith('http') ? logo1src : (logo1src.startsWith('//') ? 'https:' + logo1src : (logo1src ? 'https://liquipedia.net' + logo1src : ''));
      const logo2src = logo2El?.getAttribute('src') || '';
      const logo2 = logo2src.startsWith('http') ? logo2src : (logo2src.startsWith('//') ? 'https:' + logo2src : (logo2src ? 'https://liquipedia.net' + logo2src : ''));

      const scores = card.querySelectorAll('.match-info-header-scoreholder-score');
      const s1 = scores[0]?.textContent?.trim();
      const s2 = scores[1]?.textContent?.trim();

      const s1Num = parseInt(s1);
      const s2Num = parseInt(s2);
      const hasScore = !isNaN(s1Num) && !isNaN(s2Num);

      const tourn = card.querySelector('.match-info-tournament-name')?.textContent?.trim() || '';
      const tournLinkEl = card.querySelector('.match-info-tournament-name a');
      const tournPage = tournLinkEl ? tournLinkEl.getAttribute('href')?.replace(/^\/dota2\//, '').replace(/#.*/, '') : '';

      // Best-of format
      const boEl = card.querySelector('.match-info-best-of, .match-info-bo');
      let bestOf = '';
      if (boEl) {
        bestOf = boEl.textContent.trim();
      } else if (hasScore) {
        const total = s1Num + s2Num;
        const max = Math.max(s1Num, s2Num);
        if (max >= 3) bestOf = 'BO5';
        else if (max >= 2) bestOf = 'BO3';
        else if (total === 1) bestOf = 'BO1';
      }

      // Extract stream links — scan ALL streams in the card
      // Priority: Twitch (English) → Kick → YouTube → Twitch (gorgc fallback if listed)
      let stream = null;
      let kickStream = null;
      let gorgcStream = null;
      const enOnly = localStorage.getItem('d2_english_only') !== 'false';

      const englishChannels = new Set([
        'esl_dota2', 'esl_dota2_den', 'esl_dota2_fra', 'esl_dota2_rus', 'esl_dota2_ptbr', 'esl_dota2_tur',
        'dotamajor', 'dota2ti', 'epicenter_en', 'starladder_en', 'pgl_dota2', 'beyondthesummit',
        'dotastarladder_en', 'dreamleague', 'perfectworld', 'ruhub', 'maincast', 'bsl_dota2',
        'nodwin_gaming', 'aspeota2', 'btsindonesia', 'bts_dota2', 'bts_sa', 'bts_jp'
      ]);
      const channelMap = {
        'ESL_Dota_2': 'esl_dota2', 'ESL_Dota2': 'esl_dota2',
        'DotaMajor': 'dotamajor', 'The_International': 'dota2ti'
      };

      // Twitch
      card.querySelectorAll('a[href*="Special:Stream/twitch"]').forEach(el => {
        const tm = (el.getAttribute('href') || '').match(/Stream\/twitch\/([^"&?\/]+)/);
        if (!tm) return;
        const raw = tm[1];
        const channel = (channelMap[raw] || raw.toLowerCase()).toLowerCase();
        if (channel === 'gorgc') { gorgcStream = 'twitch:gorgc'; return; }
        if (!stream && (!enOnly || englishChannels.has(channel) || /en|english|main|main_cast|broadcast|esl|pgl|epic|dreamleague/.test(channel))) {
          stream = 'twitch:' + channel;
        }
      });

      // Kick (listed as Special:Stream/kick on Liquipedia)
      // kickChannelMap corrects mismatches between Liquipedia names and actual Kick slugs
      const kickChannelMap = {
        'epl_dota_en1': 'epldota_en1',
        'epl_dota_en2': 'epldota_en2',
        'esl_dota_en':  'esldota_en',
      };
      if (!kickStream) {
        card.querySelectorAll('a[href*="Special:Stream/kick"]').forEach(el => {
          if (kickStream) return;
          const km = (el.getAttribute('href') || '').match(/Stream\/kick\/([^"&?\/]+)/);
          if (!km) return;
          const raw = km[1].toLowerCase();
          kickStream = 'kick:' + (kickChannelMap[raw] || raw);
        });
      }

      // Pick best available: Twitch EN > gorgc (Twitch fallback) > Kick (no YouTube)
      stream = stream || gorgcStream || kickStream || null;

      const now = new Date();
      const matchDate = dateISO ? new Date(dateISO) : null;
      const diffPast = matchDate ? (now - matchDate) : null;
      const diffFuture = matchDate ? (matchDate - now) : null;

      const isUpcoming = matchDate && diffFuture > 0;

      // isCompleted: series is over — someone has 2+ wins (BO3/BO5), or BO1 done (1:0 / 0:1),
      // or match is very old (3+ hrs). 0:0 is NEVER completed — game 1 is still in progress.
      const maxScore = Math.max(s1Num, s2Num);
      const totalGames = s1Num + s2Num;
      const seriesOver = totalGames > 0 && (maxScore >= 2 || totalGames === 1);
      const isCompleted =
        hasScore &&
        totalGames > 0 &&
        (seriesOver || diffPast > 3 * 60 * 60 * 1000);

      // isLive: match started, not completed, within 6h window
      const isLive =
        matchDate &&
        diffPast >= 0 &&
        diffPast < 6 * 60 * 60 * 1000 &&
        !isCompleted;

      if (matchDate && diffPast > 3 * 24 * 60 * 60 * 1000) return;

      const key = t1 + '|' + t2 + '|' + (ts || '');
      if (seen.has(key)) return;
      seen.add(key);

      matches.push({ t1, t2, s1, s2, dateISO, tourn, tournPage, stream, bestOf, logo1, logo2, isLive, isCompleted, isUpcoming });
    });

    return matches;
  }

  // ── Favorites sort ──
  function sortWithFavorites(matches) {
    return [...matches].sort((a, b) => {
      const af = matchHasFav(a) ? 0 : 1;
      const bf = matchHasFav(b) ? 0 : 1;
      return af - bf;
    });
  }

  // ── Tournament filter ──
  function populateFilter(matches) {
    const sel = document.getElementById('tourn-filter');
    const current = sel.value;
    const tourns = [...new Set(matches.map(m => m.tourn).filter(Boolean))].sort();
    sel.innerHTML = '<option value="">All tournaments</option>' +
      tourns.map(t => `<option value="${t}" ${t === current ? 'selected' : ''}>${t}</option>`).join('');
  }
  function applyFilter() {
    activeFilter = document.getElementById('tourn-filter').value;
    renderCurrent();
  }

  // ── Dismiss ──
  function dismissMatch(id, event) {
    event.stopPropagation();
    dismissed.add(id);
    saveDismissed();
    updateRestoreBtn();
    const el = document.querySelector('[data-match-id="' + CSS.escape(id) + '"]');
    if (el) {
      el.style.transition = 'opacity 0.2s, max-height 0.3s';
      el.style.opacity = '0';
      el.style.maxHeight = '0';
      setTimeout(() => el.remove(), 300);
    }
  }

  function restoreAllDismissed() {
    dismissed.clear();
    saveDismissed();
    updateRestoreBtn();
    renderCurrent();
  }

  function updateRestoreBtn() {
    const btn = document.getElementById('restore-dismissed-btn');
    if (!btn) return;
    if (dismissed.size > 0) {
      btn.style.display = '';
      btn.textContent = 'Show ' + dismissed.size + ' hidden';
    } else {
      btn.style.display = 'none';
    }
  }

  // ── Stream ──
  function openStream(streamKey, matchLabel, event, tournPage, tournName) {
    if (event) event.stopPropagation();
    const panel = document.getElementById('stream-panel');
    const frame = document.getElementById('stream-frame');
    const label = document.getElementById('stream-label');

    const [type, channel] = streamKey.includes(':') ? streamKey.split(':') : ['twitch', streamKey.split('/').pop()];

    let src = '';
    if (type === 'twitch') {
      const parents = new Set(['officialheartseeker.github.io', 'localhost', '127.0.0.1']);
      if (location.hostname) parents.add(location.hostname);
      const parentStr = [...parents].map(h => `parent=${h}`).join('&');
      src = `https://player.twitch.tv/?channel=${channel}&${parentStr}`;
    } else if (type === 'kick') {
      src = `https://player.kick.com/${channel}`;
    } else {
      return; // unsupported type
    }

    label.textContent = matchLabel || ('Stream: ' + channel);
    frame.src = src;
    panel.classList.remove('hidden');
    panel.scrollIntoView({ behavior: 'smooth', block: 'start' });

    if (tournPage) setActiveStandingsTournament(tournPage, tournName);
  }

  // ── Kick live-check ──
  // After render, verify each Kick stream button is actually live via Kick API.
  // Buttons that belong to channels not currently live are hidden.
  async function checkKickStreams() {
    const buttons = document.querySelectorAll('.stream-btn[data-kick-channel]');
    if (!buttons.length) return;

    const checked = new Map(); // slug → is_live bool

    await Promise.allSettled([...buttons].map(async btn => {
      const slug = btn.getAttribute('data-kick-channel');
      if (!slug) return;

      if (!checked.has(slug)) {
        try {
          const url = 'https://api.allorigins.win/raw?url=' + encodeURIComponent('https://kick.com/api/v2/channels/' + slug);
          const res = await fetch(url, { signal: AbortSignal.timeout ? AbortSignal.timeout(6000) : undefined });
          if (!res.ok) { checked.set(slug, false); return; }
          const data = await res.json();
          // livestream is null when offline, object when live
          checked.set(slug, !!(data && data.livestream));
        } catch {
          checked.set(slug, false);
        }
      }

      if (checked.get(slug) === false) {
        btn.style.display = 'none';
      }
    }));
  }

  function setActiveStandingsTournament(tournPage, tournName) {
    if (!tournPage || !standingsSelect) return;
    // Ensure the option exists in the dropdown
    let opt = [...standingsSelect.options].find(o => o.value === tournPage);
    if (!opt) {
      opt = document.createElement('option');
      opt.value = tournPage;
      opt.text = tournName || tournPage;
      standingsSelect.appendChild(opt);
    }
    if (standingsSelect.value === tournPage) return; // already active
    standingsSelect.value = tournPage;
    fetchStandings(tournPage, tournName || opt.text);
    // Scroll standings widget into view
    const sw = document.getElementById('standings-widget');
    if (sw) sw.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  function toggleFullscreen() {
    document.getElementById('stream-panel').classList.toggle('fullscreen');
  }

  function closeStream() {
    const panel = document.getElementById('stream-panel');
    const frame = document.getElementById('stream-frame');
    frame.src = '';
    panel.classList.remove('fullscreen');
    panel.classList.add('hidden');
  }

  // ── Inline roster detail ──
  let openMatchId = null;

  function openDetail(m, event) {
    if (event) event.stopPropagation();
    const id = matchId(m);
    const safeId = id.replace(/[^a-zA-Z0-9]/g, '_');

    // Toggle off if already open
    const existing = document.getElementById('roster-' + safeId);
    if (existing) {
      existing.remove();
      openMatchId = null;
      return;
    }

    // Close any other open roster
    document.querySelectorAll('.roster-detail').forEach(el => el.remove());
    openMatchId = id;

    // Sync standings to this match's tournament
    if (m.tournPage) setActiveStandingsTournament(m.tournPage, m.tourn);

    // Find the match row and insert roster below it
    const row = document.querySelector('[data-match-id="' + CSS.escape(id) + '"]');
    if (!row) return;

    const detail = document.createElement('div');
    detail.className = 'roster-detail';
    detail.id = 'roster-' + safeId;
    detail.innerHTML = '<div style="text-align:center;color:var(--muted);font-size:0.6rem;padding:0.5rem;"><div class="loader" style="display:inline-block;vertical-align:middle;margin-right:0.4rem;width:12px;height:12px;"></div>Loading rosters...</div>';
    row.after(detail);

    Promise.all([
      fetchRoster(m.t1),
      fetchRoster(m.t2)
    ]).then(([r1, r2]) => {
      const el = document.getElementById('roster-' + safeId);
      if (!el) return;
      el.innerHTML = `<div class="rosters">
        <div class="roster">
          <div class="roster-title">${m.logo1 ? `<img src="${m.logo1}" referrerpolicy="no-referrer" style="width:16px;height:16px;object-fit:contain;">` : ''}${m.t1}</div>
          ${renderRoster(r1)}
        </div>
        <div class="roster">
          <div class="roster-title">${m.logo2 ? `<img src="${m.logo2}" referrerpolicy="no-referrer" style="width:16px;height:16px;object-fit:contain;">` : ''}${m.t2}</div>
          ${renderRoster(r2)}
        </div>
      </div>`;
    }).catch(() => {
      const el = document.getElementById('roster-' + safeId);
      if (el) el.innerHTML = '<div style="text-align:center;color:var(--muted);font-size:0.6rem;padding:0.5rem;">Could not load rosters</div>';
    });
  }

  function closeDetail() {
    document.querySelectorAll('.roster-detail').forEach(el => el.remove());
    openMatchId = null;
  }

  function fetchRoster(teamName) {
    if (teamName === 'TBD') return Promise.resolve([]);
    if (rosterCache[teamName]) return Promise.resolve(rosterCache[teamName]);

    const pageName = teamName.replace(/ /g, '_');
    const url = TEAM_API.replace('{TEAM}', encodeURIComponent(pageName));

    return new Promise((resolve, reject) => {
      const xhr = new XMLHttpRequest();
      xhr.open('GET', url);
      xhr.onload = function() {
        try {
          const data = JSON.parse(xhr.responseText);
          resolve(data);
        } catch(e) { reject(e); }
      };
      xhr.onerror = () => reject(new Error('Network error'));
      xhr.send();
    })
    .then(data => {
      const rawHtml = data?.parse?.text?.['*'];
      if (!rawHtml) return [];

      const tmp = document.createElement('div');
      tmp.innerHTML = rawHtml;

      let players = [];

      // 1. Hitta "Active" sektionen korrekt
      let activeHeader = tmp.querySelector('#Active_Roster') || tmp.querySelector('#Active');

      if (activeHeader) {
        // Walk up to the top-level container (mw-heading wrapper or the heading itself)
        let el = activeHeader.closest('.mw-heading') || activeHeader.closest('h2, h3, h4') || activeHeader;

        // Scan all subsequent siblings for a .table2 roster table
        let next = el.nextElementSibling;
        while (next) {
          // Stop if we hit another heading (next section)
          if (/^H[2-4]$/i.test(next.tagName)) break;

          // Look for table2 roster - either this element or nested inside it
          const tableEl = next.classList?.contains('table2') ? next : next.querySelector?.('.table2');
          if (tableEl) {
            const rows = tableEl.querySelectorAll('tr');
            rows.forEach(row => {
              const nickEl = row.querySelector('.inline-player a');
              if (!nickEl) return;

              const cells = row.querySelectorAll('td');

              // Find role: scan cells for a position value (1-5 or C)
              let role = '';
              for (let ci = cells.length - 1; ci >= 0; ci--) {
                const val = cells[ci]?.textContent?.trim();
                if (/^[1-5C]$/.test(val)) { role = val; break; }
              }

              players.push({
                nick: nickEl.textContent.trim(),
                role: role,
                country: row.querySelector('.flag img')?.alt || ''
              });
            });
            if (players.length) break;
          }
          next = next.nextElementSibling;
        }
      }

      // 3. Fallback (mycket viktig)
      if (players.length === 0) {
        const seen = new Set();

        tmp.querySelectorAll('.inline-player a').forEach(a => {
          const nick = a.textContent.trim();

          if (
            nick &&
            nick.length < 25 &&
            !seen.has(nick) &&
            players.length < 7
          ) {
            seen.add(nick);
            players.push({
              nick,
              role: '',
              country: ''
            });
          }
        });
      }

      rosterCache[teamName] = players;
      return players;
    })
      .catch(err => {
        console.warn('Roster fetch failed for', teamName, err);
        return [];
      });
  }

  const ROLE_NAMES = {
    '1': 'Carry',
    '2': 'Mid',
    '3': 'Offlane',
    '4': 'Soft Supp',
    '5': 'Hard Supp',
    'C': 'Coach'
  };

  function renderRoster(players) {
    if (!players || players.length === 0) {
      return '<div class="roster-player" style="color:var(--muted);font-style:italic;">Roster unavailable</div>';
    }
    return players.slice(0, 7).map(p => {
      const roleLabel = ROLE_NAMES[p.role] || (p.role ? 'Pos ' + p.role : '');
      return `<div class="roster-player">
        ${roleLabel ? `<span class="role">${roleLabel}</span>` : ''}
        <span class="nick">${p.nick}</span>
        ${p.country ? `<span class="country">${p.country}</span>` : ''}
      </div>`;
    }).join('');
  }

  // ── Render ──
  function renderMatch(m, i) {
    const id = matchId(m);
    if (dismissed.has(id)) return '';

    const timeStr = formatTime(m.dateISO);
    const soon = isSoon(m.dateISO);
    const hasFav = matchHasFav(m);

    let s1 = parseInt(m.s1);
    let s2 = parseInt(m.s2);
    const hasScore = !isNaN(s1) && !isNaN(s2);

    let scoreHtml = '';
    if (hasScore || m.isLive) {
      if (!hasScore) { s1 = 0; s2 = 0; }
      scoreHtml = `<span class="score ${s1 > s2 ? 'winner' : ''}">${s1}</span>
                  <span class="score-sep">:</span>
                  <span class="score ${s2 > s1 ? 'winner' : ''}">${s2}</span>`;
    } else {
      scoreHtml = `<span class="vs">vs</span>`;
    }

    // Countdown for soon matches
    const cdId = soon ? 'cd-' + id.replace(/[^a-zA-Z0-9]/g, '_') : '';

    const metaHtml =
      (m.isLive ? `<span class="live-badge">&#9679; LIVE</span>` : '') +
      (soon && !m.isLive ? `<span class="time-tag soon countdown" id="${cdId}">${formatCountdown(m.dateISO)}</span>` : '') +
      (!soon && timeStr ? `<span class="time-tag">${timeStr}</span>` : '') +
      (m.bestOf ? `<span class="bo-tag">${m.bestOf}</span>` : '') +
      (m.tourn ? (m.tournPage ? `<a class="tourn-tag" href="https://liquipedia.net/dota2/${m.tournPage}" target="_blank" onclick="event.stopPropagation()" title="${m.tourn}">${m.tourn}</a>` : `<span class="tourn-tag">${m.tourn}</span>`) : '') +
      (m.stream && m.isLive ? `<button class="stream-btn"${m.stream.startsWith('kick:') ? ` data-kick-channel="${m.stream.split(':')[1]}"` : ''} onclick="openStream('${m.stream}', '${m.t1.replace(/'/g, "\\'")} vs ${m.t2.replace(/'/g, "\\'")}', event, '${(m.tournPage||'').replace(/'/g,"\\'")}', '${(m.tourn||'').replace(/'/g,"\\'")}')">&#9654; Watch</button>` : '');

    const rowClass = m.isLive ? 'is-live' : m.isCompleted ? 'is-completed' : 'is-upcoming';
    const favClass = hasFav ? ' is-fav' : '';

    const safeM = encodeURIComponent(JSON.stringify({ t1: m.t1, t2: m.t2, tourn: m.tourn, tournPage: m.tournPage, dateISO: m.dateISO, logo1: m.logo1, logo2: m.logo2 }));

    return `
    <div class="match-row ${rowClass}${favClass}" data-match-id="${id}" onclick="openDetail(JSON.parse(decodeURIComponent('${safeM}')), event)">
      <div class="match-teams">
        <span class="team-name left ${m.t1 === 'TBD' ? 'tbd' : ''}${isFav(m.t1) ? ' is-fav' : ''}">
          <button class="fav-btn ${isFav(m.t1) ? 'active' : ''}" onclick="toggleFav('${m.t1.replace(/'/g, "\\'")}', event)" title="Favorite">&#9733;</button>

  function liquipediaXhr(page) {
    return new Promise((resolve, reject) => {
      const url = 'https://liquipedia.net/dota2/api.php?action=parse&page=' + encodeURIComponent(page) + '&prop=text&format=json&origin=*';
      const xhr = new XMLHttpRequest();
      xhr.open('GET', url);
      xhr.setRequestHeader('Accept', 'application/json');
      xhr.onload = () => {
        try {
          const data = JSON.parse(xhr.responseText);
          const html = data?.parse?.text?.['*'];
          if (!html) { reject('empty'); return; }
          const tmp = document.createElement('div');
          tmp.innerHTML = html;
          resolve(tmp);
        } catch(e) { reject(e); }
      };
      xhr.onerror = () => reject('network');
      xhr.send();
    });
  }

  function fetchStandings(tournPage, tournName) {
    if (!tournPage) {
      standingsBody.innerHTML = '<div class="empty-state">No tournament page found</div>';
      return;
    }

    if (standingsCache[tournPage]) {
      renderStandingsFull(standingsCache[tournPage], tournName);
      return;
    }

    standingsBody.innerHTML = '<div class="loading-state"><div class="loader"></div>Loading standings...</div>';

    // Fetch all relevant subpages in parallel
    const mainP     = liquipediaXhr(tournPage).catch(() => null);
    const groupP    = liquipediaXhr(tournPage + '/Group_Stage').catch(() => null);
    const playinP   = liquipediaXhr(tournPage + '/Play-In').catch(() => null);
    const swissP    = liquipediaXhr(tournPage + '/Swiss_Stage').catch(() => null);
    const playoffsP = liquipediaXhr(tournPage + '/Playoffs').catch(() => null);

    Promise.all([mainP, groupP, playinP, swissP, playoffsP]).then(([mainTmp, groupTmp, playinTmp, swissTmp, playoffsTmp]) => {
      const data = { groups: [], playoffs: [], bracket: [] };

      // Collect groups from all group-stage sources, merge unique ones
      const mergeGroups = (existing, incoming) => {
        if (!incoming.length) return existing;
        if (!existing.length) return incoming;
        // Append groups not already present by name
        const names = new Set(existing.map(g => g.name));
        return [...existing, ...incoming.filter(g => !names.has(g.name))];
      };

      if (groupTmp)  data.groups = mergeGroups(data.groups, parseGroupStage(groupTmp));
      if (playinTmp) data.groups = mergeGroups(data.groups, parseGroupStage(playinTmp));
      if (swissTmp)  data.groups = mergeGroups(data.groups, parseGroupStage(swissTmp));

      if (mainTmp) {
        data.playoffs = parsePrizepool(mainTmp);
        if (!data.groups.length) data.groups = parseGroupStage(mainTmp);
        data.bracket = parseBracket(mainTmp);
      }

      // Playoffs subpage — prefer if it has more bracket rounds
      if (playoffsTmp) {
        const bracketFromPlayoffs = parseBracket(playoffsTmp);
        const cur = (data.bracket.upper?.length||0) + (data.bracket.lower?.length||0) + (data.bracket.grand?.length||0);
        const pl  = (bracketFromPlayoffs.upper?.length||0) + (bracketFromPlayoffs.lower?.length||0) + (bracketFromPlayoffs.grand?.length||0);
        if (pl > cur) data.bracket = bracketFromPlayoffs;
        if (!data.playoffs.length) data.playoffs = parsePrizepool(playoffsTmp);
      }
      // Swiss stage may also have a bracket
      if (swissTmp) {
        const swissBracket = parseBracket(swissTmp);
        const cur = (data.bracket.upper?.length||0) + (data.bracket.lower?.length||0) + (data.bracket.grand?.length||0);
        const sw  = (swissBracket.upper?.length||0) + (swissBracket.lower?.length||0) + (swissBracket.grand?.length||0);
        if (sw > cur) data.bracket = swissBracket;
      }

      standingsCache[tournPage] = data;
      renderStandingsFull(data, tournName);
    }).catch(() => {
      standingsBody.innerHTML = '<div class="empty-state">Error loading standings</div>';
    });
  }

  function parseBracket(tmp) {
    const brackets = { upper: [], lower: [], grand: [] };

    const wrapper = tmp.querySelector('.brkts-bracket');
    if (!wrapper) return brackets;

    const parseEntry = (entry) => {
      const teamEl = entry.querySelector('.name.hidden-xs, .name');
      const team = entry.getAttribute('aria-label') || teamEl?.textContent?.trim() || 'TBD';
      const scoreEl = entry.querySelector('.brkts-opponent-score-inner');
      const score = scoreEl?.textContent?.trim() || '';
      const won = entry.querySelector('.brkts-opponent-win') !== null || entry.classList.contains('brkts-opponent-win') || (scoreEl && scoreEl.querySelector('b'));
      const logoEl = entry.querySelector('.team-template-darkmode img') || entry.querySelector('.team-template-image-icon img');
      const src = logoEl?.getAttribute('src') || '';
      const logo = src.startsWith('http') ? src : (src.startsWith('//') ? 'https:' + src : (src ? 'https://liquipedia.net' + src : ''));
      return { team, score, won, logo };
    };

    // Actual structure: headers contain all round names, bodies contain all round-centers
    // Get ALL headers from all brkts-round-header elements
    const headerDivs = [...wrapper.querySelectorAll('.brkts-header-div')];
    const allRoundNames = headerDivs.map(div => {
      const firstOpt = div.querySelector('.brkts-header-option');
      return firstOpt?.textContent?.trim() || '';
    }).filter(n => n);

    // Get ALL round-centers (should be 1 per round name)
    const roundCenters = [...wrapper.querySelectorAll('.brkts-round-center')];

    // Match them by index
    allRoundNames.forEach((name, idx) => {
      const center = roundCenters[idx];
      if (!center || !name) return;

      // Determine bracket type
      let bt = 'upper';
      if (name.toLowerCase().includes('grand')) bt = 'grand';
      else if (name.toLowerCase().includes('lower') || /^lb/i.test(name)) bt = 'lower';

      // Get matches from this specific round-center
      const matches = [];
      const matches_in_center = center.querySelectorAll(':scope .brkts-match');
      matches_in_center.forEach(matchEl => {
        // Skip if inside a popup
        if (matchEl.closest('.brkts-popup')) return;

        // Find opponent entries directly under this match (not in popup)
        const entries = [];
        matchEl.querySelectorAll('.brkts-opponent-entry').forEach(e => {
          if (!e.closest('.brkts-popup')) entries.push(e);
        });

        if (entries.length >= 2) {
          matches.push({ t1: parseEntry(entries[0]), t2: parseEntry(entries[1]) });
        }
      });

      if (matches.length) {
        brackets[bt].push({ name, matches });
      }
    });

    return brackets;
  }

  function parseGroupStage(tmp) {
    const groups = [];
    // Find grouptables: .grouptable or wikitable with group headers
    const tables = tmp.querySelectorAll('.grouptable');

    if (tables.length) {
      tables.forEach(table => {
        // Group name from preceding h3 or from table header
        let groupName = '';
        const headerCell = table.querySelector('th');
        if (headerCell) {
          const text = headerCell.textContent.trim();
          if (text !== 'Standings') groupName = text;
        }
        // Try to find group name from a preceding heading
        if (!groupName) {
          let prev = table.previousElementSibling;
          // Walk up through wrappers
          if (!prev && table.parentElement) prev = table.parentElement.previousElementSibling;
          while (prev) {
            if (/^(H[2-4]|DIV)$/i.test(prev.tagName)) {
              const hText = prev.textContent.trim().replace(/\[e\]/, '').trim();
              if (hText.match(/group/i)) { groupName = hText; break; }
            }
            prev = prev.previousElementSibling;
          }
        }

        const teams = [];
        table.querySelectorAll('tr').forEach(row => {
          const cells = row.querySelectorAll('td');
          if (cells.length < 2) return;

          const placeCell = cells[0];
          const place = placeCell?.textContent?.trim() || '';
          if (!place || !place.match(/^\d/)) return;

          // Team name: from .grouptableslot or team-template
          const teamSlot = row.querySelector('.grouptableslot');
          const teamEl = teamSlot?.querySelector('a') || row.querySelector('.team-template-text a');
          const team = teamEl?.textContent?.trim() || teamSlot?.textContent?.trim() || '';

          // Logo
          const logoEl = row.querySelector('.team-template-image-icon img');
          const src = logoEl?.getAttribute('src') || '';
          const logo = src.startsWith('http') ? src : (src.startsWith('//') ? 'https:' + src : (src ? 'https://liquipedia.net' + src : ''));

          // Record & map score from last cells
          // Some tables: last 2 cells = W-L record + Maps; others: only 1 record cell "W-L"
          const allCells = [...cells];
          const secondLast = allCells[allCells.length - 2]?.textContent?.trim() || '';
          const last = allCells[allCells.length - 1]?.textContent?.trim() || '';
          // If second-to-last looks like a W-D-L or W-L record (digits with dashes), treat as record + maps
          const looksLikeRecord = /^\d+[\-–]\d/.test(secondLast);
          const record = looksLikeRecord ? secondLast : last;
          const mapScore = looksLikeRecord ? last : '';

          // Qualification status: check row class first, then first <td> class (some pages only mark the cell)
          const rowClass = row.className || '';
          const tdClass = cells[0]?.className || '';
          const combinedClass = rowClass + ' ' + tdClass;
          let status = '';
          if (combinedClass.includes('bg-up')) status = 'up';
          else if (combinedClass.includes('bg-stayup')) status = 'stayup';
          else if (combinedClass.includes('bg-stay')) status = 'stay';
          else if (combinedClass.includes('bg-down')) status = 'down';

          if (team) teams.push({ place, team, logo, record, mapScore, status });
        });

        if (teams.length) {
          groups.push({ name: groupName || ('Group ' + String.fromCharCode(65 + groups.length)), teams });
        }
      });
    }

    return groups;
  }

  function parsePrizepool(tmp) {
    const results = [];
    const prizeRows = tmp.querySelectorAll('.csstable-widget-row[class*="background-color-"]');
    prizeRows.forEach(row => {
      const placeEl = row.querySelector('.prizepooltable-place');
      const place = placeEl?.textContent?.trim() || '';
      if (!place) return;

      const cells = row.querySelectorAll('.csstable-widget-cell');
      let prize = '';
      for (let i = 1; i < cells.length; i++) {
        const text = cells[i]?.textContent?.trim() || '';
        if (text.match(/^\$[\d,]+/)) { prize = text; break; }
      }

      const nameEl = row.querySelector('.block-team .name a') || row.querySelector('.block-team a');
      const team = nameEl?.textContent?.trim() || '';
      const logoEl = row.querySelector('.team-template-image-icon img');
      const src = logoEl?.getAttribute('src') || '';
      const logo = src.startsWith('http') ? src : (src.startsWith('//') ? 'https:' + src : (src ? 'https://liquipedia.net' + src : ''));

      results.push({ place, team: team || 'TBD', logo, prize });
    });

    // Fallback
    if (!results.length) {
      tmp.querySelectorAll('.csstable-widget-row').forEach(row => {
        const placeEl = row.querySelector('.prizepooltable-place');
        if (!placeEl) return;
        const place = placeEl.textContent.trim();
        if (!place || place === 'Place') return;
        let prize = '';
        row.querySelectorAll('.csstable-widget-cell').forEach(cell => {
          const text = cell.textContent.trim();
          if (text.match(/^\$[\d,]+/) && !prize) prize = text;
        });
        const nameEl = row.querySelector('.block-team .name a') || row.querySelector('.block-team a');
        const team = nameEl?.textContent?.trim() || '';
        const logoEl = row.querySelector('.team-template-image-icon img');
        const src = logoEl?.getAttribute('src') || '';
        const logo = src.startsWith('http') ? src : (src.startsWith('//') ? 'https:' + src : (src ? 'https://liquipedia.net' + src : ''));
        if (place) results.push({ place, team: team || 'TBD', logo, prize });
      });
    }

    return results;
  }

  let activeBracketTab = 'upper';

  function renderStandingsFull(data, tournName) {
    const hasGroups = data.groups.length > 0;
    const hasPlayoffs = data.playoffs.length > 0;
    const hasBracket = data.bracket && (data.bracket.upper?.length > 0 || data.bracket.lower?.length > 0 || data.bracket.grand?.length > 0);

    if (!hasGroups && !hasPlayoffs && !hasBracket) {
      standingsBody.innerHTML = '<div class="empty-state">No standings data available</div>';
      return;
    }

    // Auto-select available tab
    if (activeStandingsTab === 'groups' && !hasGroups) activeStandingsTab = hasBracket ? 'bracket' : 'playoffs';
    if (activeStandingsTab === 'bracket' && !hasBracket) activeStandingsTab = hasGroups ? 'groups' : 'playoffs';
    if (activeStandingsTab === 'playoffs' && !hasPlayoffs) activeStandingsTab = hasGroups ? 'groups' : 'bracket';

    // Tab bar
    let html = '<div class="standings-tabs">';
    if (hasGroups)   html += `<button class="standings-tab ${activeStandingsTab === 'groups'   ? 'active' : ''}" onclick="switchStandingsTab('groups')">Groups</button>`;
    if (hasBracket)  html += `<button class="standings-tab ${activeStandingsTab === 'bracket'  ? 'active' : ''}" onclick="switchStandingsTab('bracket')">Bracket</button>`;
    if (hasPlayoffs) html += `<button class="standings-tab ${activeStandingsTab === 'playoffs' ? 'active' : ''}" onclick="switchStandingsTab('playoffs')">Results</button>`;
    html += '</div>';

    if (activeStandingsTab === 'groups' && hasGroups) {
      data.groups.forEach(g => {
        // Detect if any team has mapScore data
        const hasMaps = g.teams.some(t => t.mapScore && t.mapScore.trim() !== '');
        html += `<div class="standings-group-header">${g.name}</div>`;
        html += `<table class="standings-table">
          <thead><tr><th>#</th><th>Team</th><th style="text-align:center">W-L</th>${hasMaps ? '<th style="text-align:center">Maps</th>' : ''}</tr></thead><tbody>`;
        g.teams.forEach(t => {
          let statusClass = '';
          let statusTitle = '';
          if (t.status === 'up')     { statusClass = 'row-qualified';  statusTitle = 'Advances'; }
          else if (t.status === 'stayup') { statusClass = 'row-tiebreak'; statusTitle = 'Tiebreaker'; }
          else if (t.status === 'down')   { statusClass = 'row-eliminated'; statusTitle = 'Eliminated'; }

          const statusDot = statusTitle
            ? `<span title="${statusTitle}" style="display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:4px;flex-shrink:0;background:${t.status==='up'?'#22c55e':t.status==='stayup'?'#f59e0b':'#ef4444'};"></span>`
            : '';

          html += `<tr class="${statusClass}">
            <td class="standings-place">${t.place}</td>
            <td class="standings-team">
              ${statusDot}
              ${t.logo ? `<img src="${t.logo}" referrerpolicy="no-referrer" alt="">` : ''}
              ${t.team}
            </td>
            <td style="text-align:center;font-weight:600;font-variant-numeric:tabular-nums;">${t.record || '-'}</td>
            ${hasMaps ? `<td style="text-align:center;color:var(--muted);font-variant-numeric:tabular-nums;">${t.mapScore || '-'}</td>` : ''}
          </tr>`;
        });
        html += '</tbody></table>';
      });
    } else if (activeStandingsTab === 'bracket' && hasBracket) {
      // Bracket sub-tabs
      const bracketTabs = [];
      if (data.bracket.upper?.length) bracketTabs.push('upper');
      if (data.bracket.lower?.length) bracketTabs.push('lower');
      if (data.bracket.grand?.length) bracketTabs.push('grand');

      if (bracketTabs.length > 1) {
        html += '<div class="bracket-subtabs">';
        bracketTabs.forEach(tab => {
          const label = tab.charAt(0).toUpperCase() + tab.slice(1) + (tab === 'grand' ? ' Final' : ' Bracket');
          html += `<button class="bracket-tab ${activeBracketTab === tab ? 'active' : ''}" onclick="switchBracketTab('${tab}')">${label}</button>`;
        });
        html += '</div>';
      }

      // Render selected bracket type
      let rounds = data.bracket[activeBracketTab] || [];
      if (!rounds.length) {
        activeBracketTab = bracketTabs[0] || 'upper';
        rounds = data.bracket[activeBracketTab] || [];
      }

      // Sort rounds logically
      const roundOrder = ['round 1', 'round 2', 'round 3', 'round 4', 'quarterfinal', 'semifinal', 'final'];
      rounds.sort((a, b) => {
        const aIdx = roundOrder.findIndex(r => a.name.toLowerCase().includes(r));
        const bIdx = roundOrder.findIndex(r => b.name.toLowerCase().includes(r));
        if (aIdx !== -1 && bIdx !== -1) return aIdx - bIdx;
        return 0;
      });

      // Horizontal bracket — each round is a column
      html += '<div class="bracket-container">';
      rounds.forEach(round => {
        html += `<div class="bracket-round">`;
        html += `<div class="bracket-round-header">${round.name || ''}</div>`;
        html += '<div class="bracket-round-matches">';
        round.matches.forEach(m => {
          const t1won = m.t1.won || (m.t1.score !== '' && m.t1.score > m.t2.score);
          const t2won = m.t2.won || (m.t2.score !== '' && m.t2.score > m.t1.score);
          // Detect BO format from scores
          const maxScore = Math.max(Number(m.t1.score) || 0, Number(m.t2.score) || 0);
          const boLabel = maxScore >= 3 ? 'BO5' : maxScore >= 2 ? 'BO3' : '';
          html += `<div class="bracket-match">
            <div class="bracket-team ${t1won ? 'bracket-winner' : ''}">
              ${m.t1.logo ? `<img src="${m.t1.logo}" referrerpolicy="no-referrer" alt="">` : '<span class="bracket-logo-placeholder"></span>'}
              <span class="bracket-team-name">${m.t1.team || 'TBD'}</span>
              <span class="bracket-score ${t1won ? 'bracket-score-win' : ''}">${m.t1.score !== '' ? m.t1.score : '-'}</span>
            </div>
            <div class="bracket-team ${t2won ? 'bracket-winner' : ''}">
              ${m.t2.logo ? `<img src="${m.t2.logo}" referrerpolicy="no-referrer" alt="">` : '<span class="bracket-logo-placeholder"></span>'}
              <span class="bracket-team-name">${m.t2.team || 'TBD'}</span>
              <span class="bracket-score ${t2won ? 'bracket-score-win' : ''}">${m.t2.score !== '' ? m.t2.score : '-'}</span>
            </div>
            ${boLabel ? `<div class="bracket-bo">${boLabel}</div>` : ''}
          </div>`;
        });
        html += '</div></div>';
      });
      html += '</div>';
    } else if (activeStandingsTab === 'playoffs' && hasPlayoffs) {
      const hasPrize = data.playoffs.some(s => s.prize);
      html += `<table class="standings-table">
        <thead><tr><th>#</th><th>Team</th>${hasPrize ? '<th style="text-align:right">Prize</th>' : ''}</tr></thead><tbody>`;
      data.playoffs.forEach((s, i) => {
        const medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 || (s.place||'').startsWith('3') ? '🥉' : '';
        let placeClass = '';
        if (s.place.startsWith('1')) placeClass = 'gold';
        else if (s.place.startsWith('2')) placeClass = 'silver';
        else if (s.place.startsWith('3')) placeClass = 'bronze';

        html += `<tr>
          <td class="standings-place ${placeClass}">${medal || s.place}</td>
          <td class="standings-team">
            ${s.logo ? `<img src="${s.logo}" referrerpolicy="no-referrer" alt="">` : ''}
            <span>${s.team}</span>
          </td>
          ${hasPrize ? `<td class="standings-prize" style="text-align:right;font-variant-numeric:tabular-nums;">${s.prize || '-'}</td>` : ''}
        </tr>`;
      });
      html += '</tbody></table>';
    }

    standingsBody.innerHTML = html;
  }

  function loadTransfersData(force) {
    const body = document.getElementById('transfers-body');
    if (transfersCache && !force) { renderTransfers(transfersCache); return; }

    body.innerHTML = '<div class="loading-state"><div class="loader"></div>Loading transfers…</div>';
    transfersCache = null;

    // Try proxies in order until one works
    const TARGET = 'https://cyberscore.live/en/transfers/';
    const PROXIES = [
      'https://api.allorigins.win/raw?url=' + encodeURIComponent(TARGET),
      'https://api.allorigins.win/raw?url=' + encodeURIComponent(TARGET) + '&t=' + Date.now(), // cache-bust retry
      'https://corsproxy.io/?' + encodeURIComponent(TARGET),
    ];

    const tryNext = (idx) => {
      if (idx >= PROXIES.length) return Promise.reject(new Error('All proxies failed'));
      return fetch(PROXIES[idx])
        .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.text(); })
        .catch(() => tryNext(idx + 1));
    };

    tryNext(0)
      .then(pageHtml => {
        const rows = parseCyberscoreTransfers(pageHtml);
        if (!rows.length) throw new Error('parse_failed');
        rows.sort((a, b) => (b.dateISO || b.date).localeCompare(a.dateISO || a.date));
        transfersCache = rows;
        renderTransfers(rows);
      })
      .catch(() => {
        // Fallback: Liquipedia transfers page
        loadTransfersFromLiquipedia(body);
      });
  }
